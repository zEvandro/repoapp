<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="theme-color" content="#050709"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="RepoApp"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <title>RepoApp</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e17;--s1:#131726;--s2:#1a1f32;--s3:#222840;--bd:#2c3454;
  --am:#f59e0b;--bl:#3b82f6;--gr:#22c55e;--rd:#ef4444;--pu:#8b5cf6;
  --tx:#dde3f5;--tx2:#8892b0;--mu:#4b5882;
  --bg-op:#020305;--s1-op:#0a0d14;--s2-op:#0e1119;--bd-op:#1a2040;
  --tx-op:#f0f4ff;--tx2-op:#6b7aa0;--mu-op:#3a4460;
  --bg-exp:#071410;--s1-exp:#0d1f18;--s2-exp:#122419;--bd-exp:#1e4030;
  --tx-exp:#d4f5e4;--tx2-exp:#5db888;--mu-exp:#2e6b4a;
  --bg-man:#07030f;--s1-man:#0e0a1a;--s2-man:#130f22;--bd-man:#261a40;
  --tx-man:#f0eeff;--tx2-man:#8875b0;--mu-man:#4a3868;
  --addr-size:68px;--addr-sp:5px;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overflow-x:hidden}
#app{display:flex;flex-direction:column;min-height:100dvh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
svg.icon{display:inline-block;vertical-align:middle;flex-shrink:0}

/* LOGIN */
.login{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a2040,var(--bg) 70%)}
.logo{width:72px;height:72px;border-radius:18px;background:var(--am);display:flex;align-items:center;
  justify-content:center;margin-bottom:20px;box-shadow:0 0 40px #f59e0b44}
.login h1{font-family:'Bebas Neue';font-size:44px;letter-spacing:3px;color:#fff}
.login-sub{font-size:12px;color:var(--tx2);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.login-ver{font-size:11px;color:var(--mu);letter-spacing:2px;margin-bottom:24px;margin-top:8px}
/* Módulos do login */
.mod-card{width:100%;border-radius:16px;overflow:hidden;border:1px solid var(--bd);
  margin-bottom:12px;transition:border-color .2s}
.mod-card-pick{border-color:#f59e0b30}
.mod-card-exp{border-color:#22c55e30}
.mod-header{padding:14px 16px;display:flex;align-items:center;gap:12px}
.mod-header-pick{background:#0f1220}
.mod-header-exp{background:#091510}
.mod-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mod-title{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px}
.mod-desc{font-size:11px;opacity:.6;margin-top:1px}
.mod-roles{display:flex;border-top:1px solid}
.mod-roles-pick{border-color:#f59e0b20;background:#080b14}
.mod-roles-exp{border-color:#22c55e20;background:#05100c}
.mod-role{flex:1;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;border:none;background:transparent;transition:background .15s;color:inherit}
.mod-role:hover{filter:brightness(1.15)}
.mod-role:active{transform:scale(.98)}
.mod-role+.mod-role{border-left:1px solid}
.mod-role-pick+.mod-role-pick{border-color:#f59e0b20}
.mod-role-exp+.mod-role-exp{border-color:#22c55e20}
.mod-role-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.mod-role-name{font-family:'Bebas Neue';font-size:16px;letter-spacing:2px}
.mod-role-desc{font-size:10px;opacity:.5;text-align:center;line-height:1.3}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(0);
  padding:10px 20px;border-radius:99px;font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:8px;z-index:300;
  animation:toastIn .2s ease,toastOut .3s ease 1.8s forwards;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* AUTH FORM */
.auth-box{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px}
.auth-inp{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);
  font-size:15px;font-weight:600;padding:13px 16px;border-radius:12px;outline:none;
  font-family:'DM Sans';transition:border-color .15s;box-sizing:border-box}
.auth-inp:focus{border-color:var(--am)}
.auth-inp::placeholder{color:var(--mu);font-weight:400}
.auth-btn{width:100%;padding:14px;background:var(--am);border:none;color:#000;
  font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;border-radius:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:filter .15s}
.auth-btn:hover{filter:brightness(1.1)}
.auth-btn:disabled{opacity:.4;cursor:not-allowed}
.auth-btn-sec{width:100%;padding:12px;background:transparent;border:1px solid var(--bd);color:var(--tx2);
  font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;border-radius:12px;cursor:pointer;transition:all .15s}
.auth-btn-sec:hover{border-color:var(--rd);color:var(--rd)}
.auth-err{font-size:12px;color:var(--rd);font-weight:700;text-align:center;padding:4px 0}
.auth-no-role{text-align:center;color:var(--tx2);font-size:13px;line-height:1.7;
  background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px}

/* ADMIN */
.adm-tab{background:var(--s1);border:1px solid var(--bd);color:var(--tx2);font-family:'Bebas Neue';
  font-size:14px;letter-spacing:1px;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .15s;flex-shrink:0}
.adm-tab-on{background:var(--am);color:#000;border-color:var(--am)}
.adm-badge{background:var(--rd);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px;vertical-align:middle}
.adm-list{display:flex;flex-direction:column;gap:8px}
.adm-row{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;
  display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.adm-email{flex:1;min-width:120px;font-size:12px;color:var(--tx);word-break:break-all}
.adm-inp{flex:1;min-width:100px;background:var(--s2);border:1px solid var(--bd);color:var(--tx);
  padding:8px 10px;border-radius:8px;font-size:13px;outline:none}
.adm-sel{background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:8px 10px;
  border-radius:8px;font-size:13px;flex:1;min-width:130px;outline:none}
.adm-btn-ok{background:var(--gn);border:none;color:#000;font-family:'Bebas Neue';font-size:14px;
  letter-spacing:1px;padding:8px 14px;border-radius:8px;cursor:pointer;white-space:nowrap}
.adm-btn-del{background:transparent;border:1px solid var(--rd);color:var(--rd);font-family:'Bebas Neue';
  font-size:13px;letter-spacing:1px;padding:6px 12px;border-radius:8px;cursor:pointer;white-space:nowrap}
.adm-badge-role{background:var(--s2);border:1px solid var(--bd);color:var(--tx2);font-size:12px;
  padding:4px 10px;border-radius:8px;white-space:nowrap}
.adm-form{display:flex;flex-direction:column;gap:10px}

/* MODAL PROBLEMA */
.prob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease}
.prob-sheet{background:var(--s1-man);border:1px solid var(--bd-man);border-radius:20px 20px 0 0;
  padding:20px 16px 32px;width:100%;max-width:440px;animation:slideUp .22s ease}
.prob-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;color:var(--rd);
  margin-bottom:4px;display:flex;align-items:center;gap:8px}
.prob-sub{font-size:12px;color:var(--tx2-man);margin-bottom:16px}
.prob-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.prob-btn{background:var(--s2-man);border:1px solid var(--bd-man);border-radius:10px;
  padding:13px 16px;cursor:pointer;text-align:left;color:var(--tx-man);
  font-size:14px;font-weight:700;font-family:'DM Sans';transition:all .15s;
  display:flex;align-items:center;gap:10px}
.prob-btn:hover{border-color:var(--rd);background:#ef444415}
.prob-btn:active{transform:scale(.99)}
.prob-cancel{width:100%;padding:12px;background:transparent;border:1px solid var(--bd-man);
  color:var(--tx2-man);border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Sans'}

/* ATRASADO – card piscando vermelho quando pendente > 10 min */
.crep-atrasado{border-left-color:#ef4444!important;animation:si .2s ease,pisca 2s ease-in-out infinite}
@keyframes pisca{0%,100%{opacity:1}50%{opacity:.7}}

/* NOME DO OPERADOR */
.op-name-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,#0a1428,var(--bg-op) 70%)}
.op-name-screen-man{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,#12082a,var(--bg-man) 70%)}
.op-name-box{background:var(--s1-op);border:1px solid var(--bd-op);border-radius:20px;
  padding:32px 28px;width:100%;max-width:360px;text-align:center}
.op-name-box-man{background:var(--s1-man);border:1px solid var(--bd-man);border-radius:20px;
  padding:32px 28px;width:100%;max-width:360px;text-align:center}
.op-name-icon{width:64px;height:64px;border-radius:16px;background:#3b82f622;border:1px solid #3b82f644;
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.op-name-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--tx-op);margin-bottom:6px}
.op-name-title-man{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--tx-man);margin-bottom:6px}
.op-name-sub{font-size:13px;color:var(--tx2-op);margin-bottom:24px;line-height:1.5}
.op-name-sub-man{font-size:13px;color:var(--tx2-man);margin-bottom:20px;line-height:1.5}
.op-name-input{width:100%;background:var(--s2-op);border:1px solid var(--bd-op);color:var(--tx-op);
  font-size:18px;font-weight:700;padding:14px 16px;border-radius:12px;outline:none;
  font-family:'DM Sans';text-align:center;transition:border-color .15s;margin-bottom:14px}
.op-name-input:focus{border-color:var(--bl)}
.op-name-input-man{width:100%;background:var(--s2-man);border:1px solid var(--bd-man);color:var(--tx-man);
  font-size:18px;font-weight:700;padding:14px 16px;border-radius:12px;outline:none;
  font-family:'DM Sans';text-align:center;transition:border-color .15s;margin-bottom:14px}
.op-name-input-man:focus{border-color:var(--pu)}
.op-name-input::placeholder{color:var(--mu-op);font-weight:400;font-size:14px}
.op-name-input-man::placeholder{color:var(--mu-man);font-weight:400;font-size:14px}
.op-name-btn{width:100%;padding:14px;background:var(--bl);border:none;color:#fff;
  font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;border-radius:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px}
.op-name-btn:hover{filter:brightness(1.1)}
.op-name-btn:disabled{opacity:.4;cursor:not-allowed}
.man-name-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.man-name-pill{background:var(--s2-man);border:1px solid var(--bd-man);color:var(--tx-man);
  font-size:13px;font-weight:700;padding:10px 16px;border-radius:10px;cursor:pointer;
  font-family:'DM Sans';transition:all .15s;display:flex;align-items:center;gap:6px}
.man-name-pill:hover{border-color:var(--pu);background:#8b5cf615;color:#c4b5fd}
.man-name-pill.online{border-color:#22c55e44;background:#22c55e10;color:#6ee7b7}

/* TOPBARS */
.topbar{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 14px;height:52px;
  display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar-op{background:var(--s1-op);border-bottom:1px solid var(--bd-op);padding:0 14px;height:52px;
  display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar-exp{background:var(--s1-exp);border-bottom:1px solid var(--bd-exp);padding:0 14px;height:52px;
  display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar-man{background:var(--s1-man);border-bottom:1px solid var(--bd-man);padding:0 14px;height:52px;
  display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-shrink:0}
.tlogo{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--am)}
.tlogo-exp{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--gr)}
.tlogo-man{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--pu)}
.trole{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.rep{background:#f59e0b22;color:var(--am);border:1px solid #f59e0b44}
.oper{background:#3b82f622;color:var(--bl);border:1px solid #3b82f644}
.expe{background:#22c55e22;color:var(--gr);border:1px solid #22c55e44}
.manob{background:#8b5cf622;color:var(--pu);border:1px solid #8b5cf644}
.op-nome-badge{font-size:11px;font-weight:700;color:var(--bl);background:#3b82f615;
  border:1px solid #3b82f630;padding:3px 10px;border-radius:99px;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.man-nome-badge{font-size:11px;font-weight:700;color:var(--pu);background:#8b5cf615;
  border:1px solid #8b5cf630;padding:3px 10px;border-radius:99px;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tsp{flex:1}
.tlive{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mu)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.tver{font-size:10px;color:var(--mu);letter-spacing:1px;font-weight:700}
.tbtn-icon{background:transparent;border:1px solid var(--bd);color:var(--tx2);
  width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tbtn-icon:hover{border-color:var(--am);color:var(--am)}
.tbtn-out{background:transparent;border:1px solid var(--bd);color:var(--tx2);
  font-size:11px;padding:5px 12px;border-radius:8px;cursor:pointer;font-weight:700;
  display:flex;align-items:center;gap:5px;height:34px}
.tbtn-out:hover{border-color:var(--rd);color:var(--rd)}

/* ONLINE BADGE */
.online-bar{padding:8px 16px;background:var(--s1);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.online-bar-exp{padding:8px 16px;background:var(--s1-exp);border-bottom:1px solid var(--bd-exp);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.online-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu)}
.online-label-exp{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu-exp)}
.online-op{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);
  border-radius:99px;padding:4px 12px 4px 8px;font-size:12px;font-weight:700;color:var(--tx2)}
.online-op-man{display:flex;align-items:center;gap:6px;background:var(--s2-exp);border:1px solid var(--bd-exp);
  border-radius:99px;padding:4px 12px 4px 8px;font-size:12px;font-weight:700;color:var(--tx2-exp)}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);flex-shrink:0;animation:blink 2s infinite}

/* PAINEL FONTE */
.font-panel{padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--s1);border-bottom:1px solid var(--bd)}
.font-panel-op{padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--s1-op);border-bottom:1px solid var(--bd-op)}
.font-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);white-space:nowrap}
.font-btns{display:flex;gap:6px}
.font-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);
  color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans';transition:all .15s}
.font-btn:hover{border-color:var(--am);color:var(--am)}
.font-btn.ativo{background:var(--am);border-color:var(--am);color:#000}
.font-preview{font-family:'Bebas Neue';color:var(--am);opacity:.3;margin-left:auto;white-space:nowrap;overflow:hidden;line-height:1}

/* FILTRO */
.filtro-bar{display:flex;gap:6px;padding:10px 16px;background:var(--s1-op);
  border-bottom:1px solid var(--bd-op);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.filtro-bar::-webkit-scrollbar{display:none}
.filtro-btn{padding:7px 14px;border-radius:99px;border:1px solid var(--bd-op);background:var(--s2-op);
  color:var(--tx2-op);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  font-family:'DM Sans';transition:all .15s;display:flex;align-items:center;gap:5px}
.filtro-btn:hover{border-color:var(--am);color:var(--am)}
.filtro-ativo{background:var(--am)!important;border-color:var(--am)!important;color:#000!important}
.filtro-n{background:rgba(0,0,0,0.2);border-radius:99px;font-size:10px;padding:1px 6px;font-weight:800}

/* STAT */
.stat-row{display:flex;gap:8px;margin-bottom:14px}
.stat-card{flex:1;border:1px solid var(--bd);border-radius:12px;padding:12px 8px;text-align:center;background:var(--s1)}
.stat-card-op{background:var(--s1-op);border-color:var(--bd-op)}
.stat-num{font-family:'Bebas Neue';font-size:28px;letter-spacing:1px;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu)}

/* CÂMARA TABS (repositor – scroll horizontal) */
.cam-tab-bar{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:52px;z-index:40}
.cam-tab-bar::-webkit-scrollbar{display:none}
.cam-tab{flex:0 0 auto;padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:.5px;
  color:var(--tx2);cursor:pointer;border:none;background:transparent;font-family:'DM Sans';
  border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;
  display:flex;align-items:center;gap:5px}
.cam-tab:hover{color:var(--tx)}
.cam-tab.ativa{border-bottom-color:currentColor}
.cam-tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* STATS INLINE NO TOPBAR */
.tstat{display:flex;align-items:center;gap:3px;background:var(--s2);border:1px solid var(--bd);
  border-radius:99px;padding:3px 9px;cursor:default}
.tstat-n{font-family:'Bebas Neue';font-size:15px;letter-spacing:.5px;line-height:1}
.tstat-l{font-size:9px;font-weight:700;color:var(--mu);letter-spacing:.5px}

/* ATRIB PILLS (repositor) */
.atrib-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.atrib-pill{padding:7px 14px;border-radius:99px;border:1px solid var(--bd);background:var(--s2);
  color:var(--tx2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  font-family:'DM Sans';transition:all .15s;display:flex;align-items:center;gap:5px;border:none;outline:none}

// â"€â"€ FONTE â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€
const FONT_SIZES = { P:42, M:56, G:72, GG:92 };
function fontKey()    { return "repoapp-font-"+(perfil||"op"); }
function fontPreset() { const s=localStorage.getItem(fontKey()); return (s&&FONT_SIZES[s])?s:"Auto"; }
function fontPx() {
  const p=fontPreset();
  if(p==="Auto"){const w=window.innerWidth;if(w<=360)return 48;if(w<=414)return 58;if(w<=768)return 68;return 80;}
  return FONT_SIZES[p];
}
function applyFont() {
  const px=fontPx();
  document.documentElement.style.setProperty("--addr-size",px+"px");
  document.documentElement.style.setProperty("--addr-sp",Math.max(2,Math.round(px*.07))+"px");
}
window.addEventListener("resize",()=>{if(fontPreset()==="Auto")applyFont();});

// â"€â"€ UTILS â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€
const fmtHora = ts=>ts?new Date(ts).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"";
function tempoFila(ts){const m=Math.floor((Date.now()-ts)/60000);if(m<1)return "agora";if(m<60)return m+"min";const h=Math.floor(m/60),r=m%60;return r?h+"h "+r+"min":h+"h";}
function corTempo(ts){const m=Math.floor((Date.now()-ts)/60000);return m<5?"var(--gr)":m<15?"var(--am)":"var(--rd)";}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function h(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function sq(v){return String(v??"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function idSafe(v){return String(v??"").replace(/[^A-Za-z0-9_-]/g,"_");}
function cleanInput(v,max=40){return String(v??"").replace(/[<>"'`]/g,"").trim().slice(0,max);}

// â"€â"€ PARSER â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€
function isPickingEnd(endCompleto){
  const s=(endCompleto||"").trim().toUpperCase();
  if(s.startsWith("F "))return true;
  return /\s10$/i.test(s);
}
function parseEnd(s,camara){
  camara=(camara||camaraAtual||"B").toUpperCase();
  s=(s||"").trim();
  if(!s)return{valido:false,erro:""};
  const cam=CAMARAS[camara];
  if(!cam)return{valido:false,erro:"Câmara inválida"};
  if(cam.especial){
    const p=s.split(/[-\/\s]+/).filter(Boolean);
    if(p.length!==2)return{valido:false,erro:'Câmara F: use RUA-POSIÇÃO  ex: "1-2"'};
    const rua=+p[0],pos=+p[1];
    if(isNaN(rua)||isNaN(pos))return{valido:false,erro:"Apenas números"};
    if(rua<1||rua>9)return{valido:false,erro:"Rua: 1 a 9"};
    if(pos<1||pos>99)return{valido:false,erro:"Posição: 1 a 99"};
    const completo=`F ${String(rua).padStart(2,"0")} ${String(pos).padStart(3,"0")}`;
    return{valido:true,completo,erro:"",camara:"F",rua,pos,nivel:null,label:`Câmara F · Rua ${rua} · Posição ${pos}`,isPicking:true};
  }
  const reCompleto=/^([A-F])\s+(\d{2,3})\s+(\d{3,4})\s+(\d{2})$/i;
  const mC=s.match(reCompleto);
  if(mC){
    const[,letra,rua,pos,nivel]=mC;
    const isPicking=nivel==="10";
    return{valido:true,completo:`${letra.toUpperCase()} ${rua.padStart(3,"0")} ${pos.padStart(4,"0")} ${nivel}`,erro:"",camara:letra.toUpperCase(),rua:+rua,pos:+pos,nivel:+nivel/10,label:`${CAMARAS[letra.toUpperCase()]?.nome||letra} · Rua ${+rua} · Pos ${+pos} · ${nivel}`,isPicking};
  }
  let input=s;
  const mLetra=input.match(/^([A-F])\s*[-\/\s]?(.*)/i);
  if(mLetra)input=mLetra[2];
  const p=input.split(/[-\/\s]+/).filter(Boolean);
  if(p.length!==3)return{valido:false,erro:'Use: RUA-POSIÇÃO-NÍVEL  ex: "4-56-2"'};
  const rua=+p[0],pos=+p[1],nivel=+p[2];
  if(isNaN(rua)||isNaN(pos)||isNaN(nivel))return{valido:false,erro:"Apenas números"};
  if(rua<1||rua>9)return{valido:false,erro:"Rua: 1 a 9"};
  if(pos<1||pos>99)return{valido:false,erro:"Posição: 1 a 99"};
  if(nivel<1||nivel>5)return{valido:false,erro:"Nível: 1–5"};
  const nivelLabel=["","Nível 10 – chão","2º nível","3º nível","4º nível","5º nível"][nivel];
  const completo=`${camara} ${String(rua).padStart(3,"0")} ${String(pos).padStart(4,"0")} ${String(nivel*10).padStart(2,"0")}`;
  const isPicking=nivel===1;
  return{valido:true,completo,erro:"",camara,rua,pos,nivel,label:`${cam.nome} · Rua ${rua} · Pos ${pos} · ${nivelLabel}`,isPicking};
}

// â"€â"€ TOAST â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€
function showToast(msg,{bg="#22c55e",color="#000"}={}){
  document.getElementById("_toast")?.remove();
  const el=document.createElement("div");
  el.id="_toast";el.className="toast";
  el.style.background=bg;el.style.color=color;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);

function beep(freq=880,times=2){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();Array.from({length:times},(_,i)=>i*.18).forEach(d=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type="sine";g.gain.setValueAtTime(0,ctx.currentTime+d);g.gain.linearRampToValueAtTime(.4,ctx.currentTime+d+.01);g.gain.linearRampToValueAtTime(0,ctx.currentTime+d+.12);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.15);});}catch{}}
function beepLib(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[[880,.0],[1047,.2],[1319,.4]].forEach(([freq,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type="sine";g.gain.setValueAtTime(0,ctx.currentTime+d);g.gain.linearRampToValueAtTime(.4,ctx.currentTime+d+.01);g.gain.linearRampToValueAtTime(0,ctx.currentTime+d+.18);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.22);});}catch{}}

// â"€â"€ SWIPE â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€
function initSwipe(el,onRight){
  let sx=0,sy=0,dx=0,moving=false;
  el.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;moving=false;},{passive:true});
  el.addEventListener("touchmove",e=>{
    dx=e.touches[0].clientX-sx;const dy=e.touches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){
      moving=true;if(dx>0){el.style.transform=`translateX(${dx}px)`;el.style.opacity=`${1-Math.min(dx/200,.4)}`;
      const h=el.querySelector(".swipe-hint");if(h){h.textContent="CONCLUÍDO";h.style.opacity=Math.min(dx/80,1);}}
    }
  },{passive:true});
  el.addEventListener("touchend",()=>{
    if(moving&&dx>80){onRight();return;}
    el.style.transform="";el.style.opacity="";
    const h=el.querySelector(".swipe-hint");if(h){h.textContent="";h.style.opacity=0;}
  });
}

  },50);
}

function cardRep(t){
  const cor={pendente:"#f59e0b",andamento:"#3b82f6",concluido:"#22c55e",vazio:"#ef4444",pulado:"#8892b0"}[t.status];
  const lbl={pendente:"Pendente",andamento:"Em andamento",concluido:"Concluído",vazio:"End. vazio",pulado:"Pulado"}[t.status];
  const isHist=["concluido","vazio"].includes(t.status);
  const tipoCor=t.tipo==="picking"?"#f59e0b":"#3b82f6";
  const tipoTxt=t.tipo==="picking"?"Pick":"Pal";
  const atrasado=!isHist&&t.status==="pendente"&&(Date.now()-t.ts)>10*60*1000;
  const metaParts=[
    `<span style="font-size:9px;font-weight:800;color:${tipoCor}">${tipoTxt}</span>`,
    t.atribNome&&t.status==="pendente"?`<span style="font-size:10px;color:#a78bfa">→ ${h(t.atribNome)}</span>`:"",
    t.opNome&&t.status!=="pendente"?`<span style="font-size:10px;color:#a78bfa">${h(t.opNome)}</span>`:"",
    `<span style="font-size:10px;color:var(--mu)">${fmtHora(t.ts)}</span>`,
    !isHist?`<span style="font-size:10px;font-weight:700;color:${corTempo(t.ts)}">${tempoFila(t.ts)}</span>`:"",
  ].filter(Boolean).join(`<span style="color:var(--mu);font-size:9px;margin:0 1px">·</span>`);
  return `
    <div class="crep${atrasado?" crep-atrasado":""}" style="border-left-color:${atrasado?"#ef4444":cor}${isHist?";opacity:.6":""}">
      <div style="display:flex;align-items:flex-start;gap:8px">
        <div style="flex:1;min-width:0">
          <div class="crep-addr" style="color:${atrasado?"#ef4444":cor};font-size:22px">${h(t.endereco)}</div>
          <div class="crep-meta" style="margin-top:5px;gap:4px">${metaParts}</div>
          ${atrasado?`<div style="font-size:9px;color:#ef4444;font-weight:700;margin-top:4px;letter-spacing:.5px">⚠ PARADO HÁ MAIS DE 10 MIN</div>`:""}
        </div>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;margin-top:2px">
          <span class="chip" style="color:${atrasado?"#ef4444":cor};border-color:${atrasado?"#ef444440":cor+"40"};background:${atrasado?"#ef444415":cor+"15"}">${lbl}</span>
          ${!isHist&&Object.keys(operadores).length>1?`<button class="btn-transfer" onclick="window.abrirRepassar('${sq(t.id)}')">${I.transfer}</button>`:""}
          ${!isHist?`<button class="btn-rem" onclick="window.remover('${sq(t.id)}')">${I.x}</button>`:""}
        </div>
      </div>
    </div>`;
}

// â"€â"€ RENDER OPERADOR â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€
function renderOperador(){
  const minhasFila=tarefas.filter(t=>{
    if(!["pendente","andamento","pulado"].includes(t.status))return false;
    if(t.atribId&&t.atribId!==opId)return false;
    if(t.status==="andamento"&&t.opId&&t.opId!==opId)return false;
    return true;
  });
  const ativos=minhasFila.filter(t=>t.status==="pendente"||t.status==="andamento").sort((a,b)=>a.ts-b.ts);
  const pulados=minhasFila.filter(t=>t.status==="pulado").sort((a,b)=>a.ts-b.ts);
  const fila=[...ativos,...pulados];
  const hist=tarefas.filter(t=>t.status==="concluido"||t.status==="vazio");
  const getRua=t=>{const m=t.endereco.match(/B\s+0*(\d+)/);return m?m[1]:null;};
  const ruasNaFila=[...new Set(fila.map(getRua).filter(Boolean))].sort();
  const filaFiltrada=filtroRua==="todas"?fila:fila.filter(t=>getRua(t)===filtroRua);
  const filtroBarHTML=ruasNaFila.length>1?`
    <div class="filtro-bar">
      <button class="filtro-btn${filtroRua==="todas"?" filtro-ativo":""}" onclick="window.setFiltroRua('todas')">${I.map} Todas</button>
      ${ruasNaFila.map(r=>`
        <button class="filtro-btn${filtroRua===r?" filtro-ativo":""}" onclick="window.setFiltroRua('${r}')">
          Rua ${r}<span class="filtro-n">${fila.filter(t=>getRua(t)===r).length}</span>
        </button>`).join("")}
    </div>`:"";
  const statsHTML=fila.length>0?`
    <div class="stat-row">
      <div class="stat-card stat-card-op"><div class="stat-num" style="color:var(--am)">${fila.length}</div><div class="stat-lbl">Minha fila</div></div>
      <div class="stat-card stat-card-op"><div class="stat-num" style="color:var(--bl)">${fila.filter(t=>t.tipo==="palete").length}</div><div class="stat-lbl">Paletes</div></div>
      <div class="stat-card stat-card-op"><div class="stat-num" style="color:var(--am)">${fila.filter(t=>t.tipo==="picking").length}</div><div class="stat-lbl">Pickings</div></div>
      <div class="stat-card stat-card-op"><div class="stat-num" style="color:var(--gr)">${hist.filter(t=>t.status==="concluido"&&t.opId===opId).length}</div><div class="stat-lbl">Fiz hoje</div></div>
    </div>`:"";
  const filaHTML=fila.length===0
    ?`<div class="empty"><div class="empty-icon-wrap">${I.inbox.replace('stroke="currentColor"','stroke="var(--mu-op)"')}</div><div class="empty-title">Sem tarefas</div><div class="empty-sub">Aguardando reposições atribuídas a você<br>ou disponíveis para qualquer operador.</div></div>`
    :statsHTML+(filaFiltrada.length===0
      ?`<div class="empty" style="padding:30px 20px"><div class="empty-icon-wrap">${I.search.replace('stroke="currentColor"','stroke="var(--mu-op)"')}</div><div class="empty-title">Nenhum na Rua ${filtroRua}</div><div class="empty-sub">Selecione outra rua ou "Todas".</div></div>`
      :filaFiltrada.map((t,i)=>cardOp(t,i)).join(""));
  document.getElementById("app").innerHTML=`
    <div class="topbar-op">
      <span class="tlogo">REPO</span>
      <span class="trole oper">${I.forklift} Operador</span>
      <span class="op-nome-badge">${h(nomeOperador)}</span>
      <span class="tsp"></span>
      <span class="tlive"><span class="dot"></span>ao vivo</span>
      <span class="tver">${APP_VERSION}</span>
      <button class="tbtn-icon" onclick="window.toggleFont()">${I.settings}</button>
      <button class="tbtn-out" onclick="window.sair()">${I.logout} Sair</button>
    </div>
    ${fontPanelHTML(true)}
    ${filtroBarHTML}
    <div class="main-op">
      ${filaHTML}
      ${filaFiltrada.length>0?`<div class="sdica">${I.swipe} Arraste para direita para <b>concluir</b> &nbsp;·&nbsp; ${I.tap} Toque em <b>Concluído</b></div>`:""}
      ${hist.length>0?`
        <div class="secao">Concluídas hoje (${hist.length})</div>
        ${hist.map(t=>`
          <div class="chist" style="border-left-color:${t.status==="concluido"?"var(--gr)":"var(--rd)"}">
            <span style="font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;color:${t.status==="concluido"?"var(--gr)":"var(--rd)"}">${h(t.endereco)}</span>
            <span style="margin-left:auto;display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mu-op)">
              ${t.opNome?`<span style="color:#a78bfa">${h(t.opNome)}</span> ·`:""}
              ${t.status==="concluido"?I.checkCircle.replace('stroke="currentColor"','stroke="var(--gr)"'):I.alert.replace('stroke="currentColor"','stroke="var(--rd)"')}
              ${fmtHora(t.ts)}
            </span>
          </div>`).join("")}`:""}
    </div>`;
  filaFiltrada.forEach(t=>{
    const el=document.getElementById("op-"+idSafe(t.id));
    if(el)initSwipe(el,()=>window.acao(t.id,"concluido"));
  });
  clearInterval(window._timerOp);
  window._timerOp=setInterval(()=>{
    document.querySelectorAll(".tempo-op").forEach(el=>{
      const ts=+el.dataset.ts;if(ts){el.textContent=tempoFila(ts);el.style.color=corTempo(ts);}
    });
  },30000);
}

function cardOp(t,i){
  const isFirst=i===0,isPulado=t.status==="pulado";
  const tipoCor=t.tipo==="picking"?"#f59e0b":"#3b82f6";
  const tipoIcon=t.tipo==="picking"?I.package:I.layers;
  const tipoTxt=t.tipo==="picking"?"PICKING":"PALETE FECHADO";
  const foiAtrib=t.atribId===opId;
  if(isFirst){
    const addrCor=isPulado?"#8892b0":"var(--am)";
    return `
      <div id="op-${idSafe(t.id)}" class="cop-main" style="${isPulado?"border-color:#8892b0;opacity:.7":""}">
        <div class="swipe-hint"></div>
        <div class="tipo-main" style="color:${tipoCor}">${tipoIcon} ${tipoTxt}${foiAtrib?` <span style="font-size:11px;color:#a78bfa;background:#8b5cf615;border:1px solid #8b5cf640;border-radius:99px;padding:2px 8px;font-family:'DM Sans';font-weight:700;letter-spacing:0">Para você</span>`:""}</div>
        <div class="addr-main" style="color:${addrCor}">${h(t.endereco)}</div>
        ${t.descricao?`<div class="desc-main">${h(t.descricao)}</div>`:""}
        ${t.codigo?`<div class="cod-main">${h(t.codigo)}</div>`:""}
        <div class="op-btns">
          ${t.status==="andamento"&&t.opId===opId
            ?`<button class="abtn abtn-green" onclick="window.acao('${sq(t.id)}','concluido')">${I.check} Concluído</button>
               <button class="abtn abtn-red" onclick="window.acao('${sq(t.id)}','vazio')">${I.alert} Vazio</button>
               <button class="abtn abtn-gray" onclick="window.pular('${sq(t.id)}')">${I.skip}</button>`
            :`<button class="abtn abtn-blue" onclick="window.acao('${sq(t.id)}','andamento')">${I.receive} Pegar</button>
               <button class="abtn abtn-gray" onclick="window.pular('${sq(t.id)}')">${I.skip} Pular</button>`}
        </div>
        <div class="sdica2">${I.swipe} Deslize para concluir</div>
      </div>`;
  }
  return `
    <div id="op-${idSafe(t.id)}" class="cop-sec">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--mu-op)">${h(t.endereco)}</span>
        <span style="font-size:9px;font-weight:700;color:${tipoCor}">${t.tipo==="picking"?"PICK":"PAL"}</span>
        <span class="tempo-op" data-ts="${t.ts}" style="margin-left:auto;font-size:10px;font-weight:700;color:${corTempo(t.ts)}">${tempoFila(t.ts)}</span>
      </div>
      ${t.descricao?`<div style="font-size:11px;color:var(--mu-op);margin-top:3px">${h(t.descricao)}</div>`:""}
    </div>`;
}

function papelValido(r){return ["repositor","operador","expedicao","manobrista","admin"].includes(r);}

function limparSessaoDados(){
  clearInterval(window._timerOp);
  removerOperador();
  removerManobrista();
  clearDataSubs();
  perfil=null;nomeOperador=null;opId=null;nomeManob=null;manobId=null;showFont=false;
  tarefas=[];operadores={};carregamentos=[];manobristas={};nomesManobristas={};
  prevIds=null;prevCarrIds=null;prevLibIds=[];filtroRua="todas";atribPara="qualquer";atribManob="qualquer";
}

function bindDataByPerfil(){
  clearDataSubs();
  if(perfil==="repositor"||perfil==="operador"){
    dataUnsubs.push(onValue(tasksRef,snap=>{
      if(perfil==="repositor"){
        window._fs={ end:document.getElementById("fEnd")?.value, tipo:tipoAtual, camara:camaraAtual };
      }
      const data=snap.val()||{};
      const novo=Object.entries(data).map(([id,v])=>({id,...v})).sort((a,b)=>a.ts-b.ts);
      if(perfil==="operador"&&nomeOperador&&prevIds!==null){
        const minhasNovas=novo.filter(t=>t.status==="pendente"&&(!t.atribId||t.atribId===opId)&&!prevIds.includes(t.id));
        if(minhasNovas.length>0)beep();
      }
      if(perfil==="operador"&&nomeOperador){
        prevIds=novo.filter(t=>t.status==="pendente"&&(!t.atribId||t.atribId===opId)).map(t=>t.id);
      }
      if(perfil==="repositor"&&tarefas.length>0){
        const recemConc=novo.filter(t=>t.status==="concluido"&&!tarefas.find(old=>old.id===t.id&&old.status==="concluido"));
        if(recemConc.length>0)beep(440,1);
      }
      tarefas=novo;
      render();
    },()=>{}));
    dataUnsubs.push(onValue(operadoresRef,snap=>{
      operadores=snap.val()||{};
      if(perfil==="repositor")render();
    },()=>{}));
  }
  if(perfil==="expedicao"||perfil==="manobrista"){
    dataUnsubs.push(onValue(carregRef,snap=>{
      const data=snap.val()||{};
      const novo=Object.entries(data).map(([id,v])=>({id,...v})).sort((a,b)=>a.ts-b.ts);
      if(perfil==="manobrista"&&nomeManob&&prevCarrIds!==null){
        const novas=novo.filter(c=>c.status==="pendente"&&(!c.manobNome||c.manobNome===nomeManob)&&!prevCarrIds.includes(c.id));
        if(novas.length>0)beep();
        const liberadas=novo.filter(c=>c.status==="liberado"&&(c.manobNome===nomeManob||!c.manobNome)&&!prevLibIds.includes(c.id));
        if(liberadas.length>0)beepLib();
      }
      if(perfil==="manobrista"&&nomeManob){
        prevCarrIds=novo.filter(c=>c.status==="pendente"&&(!c.manobNome||c.manobNome===nomeManob)).map(c=>c.id);
        prevLibIds=novo.filter(c=>c.status==="liberado").map(c=>c.id);
      }
      if(perfil==="expedicao"&&carregamentos.length>0){
        const novosProb=novo.filter(c=>c.status==="problema"&&!carregamentos.find(old=>old.id===c.id&&old.status==="problema"));
        if(novosProb.length>0)beep(330,3);
      }
      carregamentos=novo;
      render();
    },()=>{}));
    dataUnsubs.push(onValue(manoOnlineRef,snap=>{
      manobristas=snap.val()||{};
      if(perfil==="expedicao")render();
    },()=>{}));
    dataUnsubs.push(onValue(nomesManobRef,snap=>{
      nomesManobristas=snap.val()||{};
      render();
    },()=>{}));
  }
  if(perfil==="admin"){
    dataUnsubs.push(onValue(pendingRef,snap=>{
      pendingUsers=Object.entries(snap.val()||{}).map(([uid,v])=>({uid,...v})).sort((a,b)=>(a.ts||0)-(b.ts||0));
      render();
    },()=>{}));
    dataUnsubs.push(onValue(rolesAdmRef,snap=>{
      allRoles=snap.val()||{};
      render();
    },()=>{}));
  }
}

function aplicarPapel(role,name){
  const novoPerfil=papelValido(role)?role:null;
  if(!novoPerfil){
    limparSessaoDados();
    render();
    return;
  }
  const mudou=perfil!==novoPerfil;
  if(mudou){
    limparSessaoDados();
    perfil=novoPerfil;
  }
  if(perfil==="operador"){
    nomeOperador=cleanInput(name||authUser?.email||"Operador",30);
    opId=authUser?.uid||null;
    registrarOperador();
  }else if(perfil==="manobrista"){
    nomeManob=cleanInput(name||authUser?.email||"Manobrista",30);
    manobId=authUser?.uid||null;
    registrarManobrista();
  }
  bindDataByPerfil();
  render();
}

window.admCriarUsuario=async()=>{
  const email=(document.getElementById("adm-cemail")?.value||"").trim().toLowerCase();
  const senha=(document.getElementById("adm-csenha")?.value||"").trim();
  const nome=(document.getElementById("adm-cnome")?.value||"").trim();
  const role=document.getElementById("adm-crole")?.value;
  if(!email||!nome||!role){adminErr="Preencha email, nome e papel.";render();return;}
  adminBusy=true;adminErr="";render();
  try{
    if(senha.length>=6){
      // Tenta criar usuário novo no Auth
      const sa=getSecAuth();
      const cred=await createUserWithEmailAndPassword(sa,email,senha);
      const uid=cred.user.uid;
      await signOut(sa);
      await set(ref(db,"roles/"+uid),{role,name:nome,email});
    }else{
      // Sem senha: pré-atribui papel por email (usuário já existe no Auth)
      const emailKey=email.replace(/\./g,",");
      await set(ref(db,`preRoles/${emailKey}`),{role,name:nome,email});
    }
    adminTab="users";
    adminErr="";
    alert("Papel atribuído a \""+nome+"\".\nNa próxima vez que ele fizer login, o acesso já vai funcionar.");
  }catch(e){
    if(e.code==="auth/email-already-in-use"){
      // Usuário existe no Auth mas não no banco: pré-atribui por email
      const emailKey=email.replace(/\./g,",");
      await set(ref(db,`preRoles/${emailKey}`),{role,name:nome,email}).catch(()=>{});
      adminTab="users";
      alert("Usuário já existe. Papel pré-atribuído a \""+nome+"\".\nNa próxima vez que ele fizer login, o acesso vai funcionar automaticamente.");
    }else if(e.code==="auth/invalid-email")adminErr="Email inválido.";
    else if(e.code==="auth/weak-password")adminErr="Senha fraca (mínimo 6 caracteres).";
    else adminErr="Erro: "+(e.message||"tente novamente");
  }finally{adminBusy=false;render();}
};

window.authEntrar=async()=>{
  const email=cleanInput(document.getElementById("authEmail")?.value,120).toLowerCase();
  const senha=(document.getElementById("authPass")?.value||"").trim();
  if(!email||!senha){authErr="Informe email e senha.";render();return;}
  authBusy=true;authErr="";render();
  try{
    await setPersistence(auth,browserLocalPersistence);
    await signInWithEmailAndPassword(auth,email,senha);
  }catch(e){
    const code=e?.code||"";
    if(code==="auth/invalid-credential"||code==="auth/wrong-password"||code==="auth/user-not-found"){
      authErr="Email ou senha incorretos.";
    }else if(code==="auth/too-many-requests"){
      authErr="Muitas tentativas. Tente novamente mais tarde.";
    }else if(code==="auth/network-request-failed"){
      authErr="Sem conexão. Verifique a internet.";
    }else{
      authErr="Falha na autenticação. Tente novamente.";
    }
  }finally{
    authBusy=false;
    render();
  }
};

window.setCamara=c=>{
  camaraAtual=c;
  // Atualiza tabs
  document.querySelectorAll(".cam-tab").forEach(btn=>{
    // Extrai letra da aba pelo texto (formato "X – Nome")
    const txt=btn.textContent.trim();
    const k=txt.split("–")[0].trim();
    const cam=CAMARAS[k];if(!cam)return;
    const isAtiva=k===c;
    btn.classList.toggle("ativa",isAtiva);
    btn.style.color=isAtiva?cam.cor:"var(--tx2)";
  });
  // Scroll ativa para o centro
  const bar=document.getElementById("camTabBar");
  const ativa=bar?.querySelector(".cam-tab.ativa");
  if(bar&&ativa)bar.scrollLeft=ativa.offsetLeft-(bar.clientWidth/2)+(ativa.clientWidth/2);
  // Atualiza placeholder e label
  const fEnd=document.getElementById("fEnd");
  if(fEnd){fEnd.placeholder=CAMARAS[c]?.especial?"1-2":"4-56-2";fEnd.value="";}
  const elP=document.getElementById("prevEnd"),elA=document.getElementById("avisoEnd");
  if(elP)elP.className="prev-end hidden";if(elA)elA.className="aviso-dup hidden";
  window._endForcar=null;
};

window.setFont=preset=>{
  localStorage.setItem(fontKey(),preset);applyFont();
  document.querySelectorAll(".font-btn").forEach(b=>b.classList.toggle("ativo",b.dataset.preset===preset));
  const prev=document.getElementById("fontPreview");
  if(prev){const px=fontPx(),sp=Math.max(2,Math.round(px*.07));prev.style.fontSize=px+"px";prev.style.letterSpacing=sp+"px";}

window.setTipo=t=>{

};

window.onEnd=v=>{
  const elP=document.getElementById("prevEnd"),elA=document.getElementById("avisoEnd");
  if(!elP)return;
  if(!v.trim()){elP.className="prev-end hidden";if(elA)elA.className="aviso-dup hidden";return;}
  const r=parseEnd(v,camaraAtual);
  const cam=CAMARAS[camaraAtual]||CAMARAS.B;
  if(r.valido){
    if(r.isPicking){
      elP.className="prev-end err";
      elP.innerHTML=`<span style="color:var(--am)">${I.alert}</span><div><div class="pfull" style="color:var(--am)">${r.completo}</div><div class="pdet" style="color:var(--am);font-weight:700;margin-top:4px">${cam.especial?"Câmara F – nível de chão":"Nível 10 – picking de chão"}</div><div class="pdet" style="margin-top:3px">Este endereço já está acessível no chão.<br>O operador de empilhadeira não é necessário.</div></div>`;
      if(elA)elA.className="aviso-dup hidden";window._endForcar=null;return;
    }
    elP.className="prev-end ok";
    elP.innerHTML=`<span style="color:var(--gr)">${I.check}</span><div><div class="pfull" style="color:${cam.cor}">${r.completo}</div>${r.label?`<div class="pdet" style="margin-top:3px">${r.label}</div>`:""}</div>`;
    const dup=tarefas.find(t=>t.endereco===r.completo&&["pendente","andamento","pulado"].includes(t.status));
    if(elA){
      if(dup){elA.className="aviso-dup";elA.innerHTML=`${I.alert} Endereço já na fila como <b>${{pendente:"Pendente",andamento:"Em andamento",pulado:"Pulado"}[dup.status]}</b>. <button class="btndup" onclick="window.enviarForcar()">Enviar mesmo assim</button>`;window._endForcar=r.completo;}
      else{elA.className="aviso-dup hidden";window._endForcar=null;}
    }
  }else{
    elP.className="prev-end err";
    elP.innerHTML=`<span style="color:var(--rd)">${I.x}</span><span style="font-size:11px;color:var(--rd)">${r.erro}</span>`;
    if(elA)elA.className="aviso-dup hidden";
  }
};

async function doPush(endCompleto){
  window._fs=null;window._endForcar=null;
  await push(tasksRef,{endereco:endCompleto,tipo:tipoAtual,status:"pendente",ts:Date.now(),
    atribId:atribPara!=="qualquer"?atribPara:null,
    atribNome:atribPara!=="qualquer"?(operadores[atribPara]?.nome||null):null,
  });
  // Feedback visual + limpa campo
  showToast(`✓ ${endCompleto} enviado`);
  const fEnd=document.getElementById("fEnd");
  if(fEnd){fEnd.value="";
    document.getElementById("prevEnd")?.classList.add("hidden");
    document.getElementById("avisoEnd")?.classList.add("hidden");
    setTimeout(()=>fEnd.focus(),50);
  }
}

window.enviar=async()=>{
  const r=parseEnd(document.getElementById("fEnd")?.value||"",camaraAtual);
  if(!r.valido){alert(r.erro||"Endereço inválido");return;}
  if(r.isPicking&&r.camara!=="F"){alert("Endereço de chão – o operador não é necessário.");return;}
  const elA=document.getElementById("avisoEnd");
  if(elA&&!elA.classList.contains("hidden")&&window._endForcar)return;
  await doPush(r.completo);
};
window.enviarForcar=async()=>{const r=parseEnd(document.getElementById("fEnd")?.value||"",camaraAtual);if(r.valido&&(!r.isPicking||r.camara==="F"))await doPush(r.completo);};

window.abrirRepassar=taskId=>{
  const task=tarefas.find(t=>t.id===taskId);
  if(!task)return;
  const disponiveis=Object.entries(operadores).filter(([id])=>id!==task.atribId);
  if(disponiveis.length===0){alert("Não há outros operadores online para repassar.");return;}
  const carga=id=>tarefas.filter(t=>["pendente","andamento","pulado"].includes(t.status)&&(t.atribId===id||(!t.atribId&&id==="livre"))).length;
  const overlay=document.createElement("div");
  overlay.className="modal-overlay";overlay.id="modalRepassar";
  overlay.innerHTML=`
    <div class="modal">
      <div class="modal-title">${I.transfer} Repassar Tarefa</div>
      <div class="modal-sub"><b style="color:var(--am)">${h(task.endereco)}</b><br>${h(task.descricao||"Sem descrição")} · ${task.tipo==="picking"?"Picking":"Palete"}</div>
      <div class="modal-ops">
        ${disponiveis.map(([id,op])=>{
          const n=carga(id);
          return `<button class="modal-op-btn" onclick="window.confirmarRepassar('${sq(taskId)}','${sq(id)}','${sq(op.nome)}')">
            <div style="width:36px;height:36px;border-radius:10px;background:#3b82f622;border:1px solid #3b82f644;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              ${I.forklift.replace('width="20" height="20"','width="18" height="18"').replace('stroke="currentColor"','stroke="#3b82f6"')}
            </div>
            <div><div class="modal-op-nome">${h(op.nome)}</div><div class="modal-op-info">${n===0?"Fila livre":n===1?"1 tarefa na fila":`${n} tarefas na fila`}</div></div>
            <div style="margin-left:auto;color:${n===0?"var(--gr)":n<=2?"var(--am)":"var(--rd)"};font-family:'Bebas Neue';font-size:22px">${n}</div>
          </button>`;
        }).join("")}
        ${task.atribId?`<button class="modal-op-btn" onclick="window.confirmarRepassar('${sq(taskId)}','qualquer','')">
          <div style="width:36px;height:36px;border-radius:10px;background:#4b588220;display:flex;align-items:center;justify-content:center;flex-shrink:0">${I.users.replace('stroke="currentColor"','stroke="#8892b0"')}</div>
          <div><div class="modal-op-nome" style="color:var(--tx2)">Qualquer operador</div><div class="modal-op-info">Remover atribuição específica</div></div>
        </button>`:""}
      </div>
      <button class="modal-cancel" onclick="window.fecharModal()">Cancelar</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener("click",e=>{if(e.target===overlay)window.fecharModal();});
};

window.fecharModal=()=>{document.getElementById("modalRepassar")?.remove();};

window.confirmarRepassar=async(taskId,novoOpId,novoOpNome)=>{
  window.fecharModal();
  try{
    const updates=novoOpId==="qualquer"?{atribId:null,atribNome:null}:{atribId:novoOpId,atribNome:novoOpNome};
    await update(ref(db,`tarefas/${taskId}`),updates);
  }catch(e){alert("Erro ao repassar: "+e.message);}
};

// â"€â"€ AUTH + ROLE BOOTSTRAP â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€â"€
onAuthStateChanged(auth,user=>{
  if(roleUnsub){try{roleUnsub();}catch{}roleUnsub=null;}
  limparSessaoDados();
  authUser=user||null;
  authErr="";

  if(!authUser){
    authReady=true;
    render();
    return;
  }

  roleUnsub=onValue(ref(db,`roles/${authUser.uid}`),snap=>{
    const roleData=snap.val()||null;
    authReady=true;
    if(!roleData||!papelValido(roleData.role)){
      const emailKey=(authUser.email||"").replace(/\./g,",");
      get(ref(db,`preRoles/${emailKey}`)).then(snap=>{
        if(snap.exists()){
          const pre=snap.val();
          set(ref(db,`roles/${authUser.uid}`),{role:pre.role,name:pre.name,email:authUser.email||""})
            .then(()=>remove(ref(db,`preRoles/${emailKey}`)))
            .catch(()=>{});
        }else{
          set(ref(db,`pendingUsers/${authUser.uid}`),{email:authUser.email||"",ts:serverTimestamp()}).catch(()=>{});
          perfil=null;
          render();
        }
      }).catch(()=>{
        set(ref(db,`pendingUsers/${authUser.uid}`),{email:authUser.email||"",ts:serverTimestamp()}).catch(()=>{});
        perfil=null;
        render();
      });
      return;
    }
    aplicarPapel(roleData.role,roleData.name||"");
  },()=>{
    authReady=true;
    perfil=null;
    render();
  });
});

window.addEventListener("beforeunload",()=>{
  if(perfil==="operador")removerOperador();
  if(perfil==="manobrista")removerManobrista();
});

render();
if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
