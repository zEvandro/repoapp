<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="theme-color" content="#050709"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="RepoApp"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <title>RepoApp</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e17;--s1:#131726;--s2:#1a1f32;--s3:#222840;--bd:#2c3454;
  --am:#f59e0b;--bl:#3b82f6;--gr:#22c55e;--rd:#ef4444;--pu:#8b5cf6;
  --tx:#dde3f5;--tx2:#8892b0;--mu:#4b5882;
  --bg-op:#020305;--s1-op:#0a0d14;--s2-op:#0e1119;--bd-op:#1a2040;
  --tx-op:#f0f4ff;--tx2-op:#6b7aa0;--mu-op:#3a4460;
  --bg-exp:#030a06;--s1-exp:#0a140d;--s2-exp:#0e1a10;--bd-exp:#1a3020;
  --tx-exp:#e8f5ea;--tx2-exp:#6b9a70;--mu-exp:#3a5c40;
  --bg-man:#07030f;--s1-man:#0e0a1a;--s2-man:#130f22;--bd-man:#261a40;
  --tx-man:#f0eeff;--tx2-man:#8875b0;--mu-man:#4a3868;
  --addr-size:68px;--addr-sp:5px;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overflow-x:hidden}
#app{display:flex;flex-direction:column;min-height:100dvh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
svg.icon{display:inline-block;vertical-align:middle;flex-shrink:0}

/* LOGIN */
.login{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a2040,var(--bg) 70%)}
.logo{width:72px;height:72px;border-radius:18px;background:var(--am);display:flex;align-items:center;
  justify-content:center;margin-bottom:20px;box-shadow:0 0 40px #f59e0b44}
.login h1{font-family:'Bebas Neue';font-size:44px;letter-spacing:3px;color:#fff}
.login-sub{font-size:12px;color:var(--tx2);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.login-ver{font-size:11px;color:var(--mu);letter-spacing:2px;margin-bottom:28px;margin-top:8px}
.login-section{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.login-section::before,.login-section::after{content:"";flex:1;height:1px;background:var(--bd)}
.lcards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.lcard{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:28px 20px;
  cursor:pointer;transition:all .2s;width:150px;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--tx)}
.lcard:hover{border-color:var(--am);background:var(--s2);transform:translateY(-2px)}
.lcard-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.lcard-title{font-family:'Bebas Neue';font-size:20px;letter-spacing:2px}
.lcard-desc{font-size:11px;color:var(--tx2);text-align:center;line-height:1.5}

/* NOME DO OPERADOR */
.op-name-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,#0a1428,var(--bg-op) 70%)}
.op-name-screen-man{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,#12082a,var(--bg-man) 70%)}
.op-name-box{background:var(--s1-op);border:1px solid var(--bd-op);border-radius:20px;
  padding:32px 28px;width:100%;max-width:360px;text-align:center}
.op-name-box-man{background:var(--s1-man);border:1px solid var(--bd-man);border-radius:20px;
  padding:32px 28px;width:100%;max-width:360px;text-align:center}
.op-name-icon{width:64px;height:64px;border-radius:16px;background:#3b82f622;border:1px solid #3b82f644;
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.op-name-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--tx-op);margin-bottom:6px}
.op-name-title-man{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--tx-man);margin-bottom:6px}
.op-name-sub{font-size:13px;color:var(--tx2-op);margin-bottom:24px;line-height:1.5}
.op-name-sub-man{font-size:13px;color:var(--tx2-man);margin-bottom:20px;line-height:1.5}
.op-name-input{width:100%;background:var(--s2-op);border:1px solid var(--bd-op);color:var(--tx-op);
  font-size:18px;font-weight:700;padding:14px 16px;border-radius:12px;outline:none;
  font-family:'DM Sans';text-align:center;transition:border-color .15s;margin-bottom:14px}
.op-name-input:focus{border-color:var(--bl)}
.op-name-input-man{width:100%;background:var(--s2-man);border:1px solid var(--bd-man);color:var(--tx-man);
  font-size:18px;font-weight:700;padding:14px 16px;border-radius:12px;outline:none;
  font-family:'DM Sans';text-align:center;transition:border-color .15s;margin-bottom:14px}
.op-name-input-man:focus{border-color:var(--pu)}
.op-name-input::placeholder{color:var(--mu-op);font-weight:400;font-size:14px}
.op-name-input-man::placeholder{color:var(--mu-man);font-weight:400;font-size:14px}
.op-name-btn{width:100%;padding:14px;background:var(--bl);border:none;color:#fff;
  font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;border-radius:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px}
.op-name-btn:hover{filter:brightness(1.1)}
.op-name-btn:disabled{opacity:.4;cursor:not-allowed}
.man-name-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.man-name-pill{background:var(--s2-man);border:1px solid var(--bd-man);color:var(--tx-man);
  font-size:13px;font-weight:700;padding:10px 16px;border-radius:10px;cursor:pointer;
  font-family:'DM Sans';transition:all .15s;display:flex;align-items:center;gap:6px}
.man-name-pill:hover{border-color:var(--pu);background:#8b5cf615;color:#c4b5fd}
.man-name-pill.online{border-color:#22c55e44;background:#22c55e10;color:#6ee7b7}

/* TOPBARS */
.topbar{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 14px;height:52px;
  display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar-op{background:var(--s1-op);border-bottom:1px solid var(--bd-op);padding:0 14px;height:52px;
  display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar-exp{background:var(--s1-exp);border-bottom:1px solid var(--bd-exp);padding:0 14px;height:52px;
  display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar-man{background:var(--s1-man);border-bottom:1px solid var(--bd-man);padding:0 14px;height:52px;
  display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-shrink:0}
.tlogo{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--am)}
.tlogo-exp{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--gr)}
.tlogo-man{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--pu)}
.trole{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.rep{background:#f59e0b22;color:var(--am);border:1px solid #f59e0b44}
.oper{background:#3b82f622;color:var(--bl);border:1px solid #3b82f644}
.expe{background:#22c55e22;color:var(--gr);border:1px solid #22c55e44}
.manob{background:#8b5cf622;color:var(--pu);border:1px solid #8b5cf644}
.op-nome-badge{font-size:11px;font-weight:700;color:var(--bl);background:#3b82f615;
  border:1px solid #3b82f630;padding:3px 10px;border-radius:99px;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.man-nome-badge{font-size:11px;font-weight:700;color:var(--pu);background:#8b5cf615;
  border:1px solid #8b5cf630;padding:3px 10px;border-radius:99px;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tsp{flex:1}
.tlive{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mu)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.tver{font-size:10px;color:var(--mu);letter-spacing:1px;font-weight:700}
.tbtn-icon{background:transparent;border:1px solid var(--bd);color:var(--tx2);
  width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tbtn-icon:hover{border-color:var(--am);color:var(--am)}
.tbtn-out{background:transparent;border:1px solid var(--bd);color:var(--tx2);
  font-size:11px;padding:5px 12px;border-radius:8px;cursor:pointer;font-weight:700;
  display:flex;align-items:center;gap:5px;height:34px}
.tbtn-out:hover{border-color:var(--rd);color:var(--rd)}

/* ONLINE BADGE */
.online-bar{padding:8px 16px;background:var(--s1);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.online-bar-exp{padding:8px 16px;background:var(--s1-exp);border-bottom:1px solid var(--bd-exp);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.online-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu)}
.online-label-exp{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu-exp)}
.online-op{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);
  border-radius:99px;padding:4px 12px 4px 8px;font-size:12px;font-weight:700;color:var(--tx2)}
.online-op-man{display:flex;align-items:center;gap:6px;background:var(--s2-exp);border:1px solid var(--bd-exp);
  border-radius:99px;padding:4px 12px 4px 8px;font-size:12px;font-weight:700;color:var(--tx2-exp)}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);flex-shrink:0;animation:blink 2s infinite}

/* PAINEL FONTE */
.font-panel{padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--s1);border-bottom:1px solid var(--bd)}
.font-panel-op{padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--s1-op);border-bottom:1px solid var(--bd-op)}
.font-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);white-space:nowrap}
.font-btns{display:flex;gap:6px}
.font-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);
  color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans';transition:all .15s}
.font-btn:hover{border-color:var(--am);color:var(--am)}
.font-btn.ativo{background:var(--am);border-color:var(--am);color:#000}
.font-preview{font-family:'Bebas Neue';color:var(--am);opacity:.3;margin-left:auto;white-space:nowrap;overflow:hidden;line-height:1}

/* FILTRO */
.filtro-bar{display:flex;gap:6px;padding:10px 16px;background:var(--s1-op);
  border-bottom:1px solid var(--bd-op);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.filtro-bar::-webkit-scrollbar{display:none}
.filtro-btn{padding:7px 14px;border-radius:99px;border:1px solid var(--bd-op);background:var(--s2-op);
  color:var(--tx2-op);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  font-family:'DM Sans';transition:all .15s;display:flex;align-items:center;gap:5px}
.filtro-btn:hover{border-color:var(--am);color:var(--am)}
.filtro-ativo{background:var(--am)!important;border-color:var(--am)!important;color:#000!important}
.filtro-n{background:rgba(0,0,0,0.2);border-radius:99px;font-size:10px;padding:1px 6px;font-weight:800}

/* STAT */
.stat-row{display:flex;gap:8px;margin-bottom:14px}
.stat-card{flex:1;border:1px solid var(--bd);border-radius:12px;padding:12px 8px;text-align:center;background:var(--s1)}
.stat-card-op{background:var(--s1-op);border-color:var(--bd-op)}
.stat-num{font-family:'Bebas Neue';font-size:28px;letter-spacing:1px;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu)}

/* CÂMARA TABS (repositor — scroll horizontal) */
.cam-tab-bar{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:52px;z-index:40}
.cam-tab-bar::-webkit-scrollbar{display:none}
.cam-tab{flex:0 0 auto;padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:.5px;
  color:var(--tx2);cursor:pointer;border:none;background:transparent;font-family:'DM Sans';
  border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;
  display:flex;align-items:center;gap:5px}
.cam-tab:hover{color:var(--tx)}
.cam-tab.ativa{border-bottom-color:currentColor}
.cam-tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* STATS INLINE NO TOPBAR */
.tstat{display:flex;align-items:center;gap:3px;background:var(--s2);border:1px solid var(--bd);
  border-radius:99px;padding:3px 9px;cursor:default}
.tstat-n{font-family:'Bebas Neue';font-size:15px;letter-spacing:.5px;line-height:1}
.tstat-l{font-size:9px;font-weight:700;color:var(--mu);letter-spacing:.5px}

/* ATRIB PILLS (repositor) */
.atrib-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.atrib-pill{padding:7px 14px;border-radius:99px;border:1px solid var(--bd);background:var(--s2);
  color:var(--tx2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  font-family:'DM Sans';transition:all .15s;display:flex;align-items:center;gap:5px;border:none;outline:none}
.atrib-pill:hover{border:1px solid var(--am);color:var(--am)}
.atrib-pill.ativo{background:var(--am);color:#000}
.atrib-pill.ativo svg{stroke:#000}

/* CÂMARA SELECTOR (legado — mantido para setCamara) */
.camara-sel{display:none}
.camara-btn{display:none}
.camara-letra{display:none}
.camara-nome{display:none}
.atrib-select{display:none}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:16px;background:var(--bg)}
.main-op{flex:1;overflow-y:auto;padding:16px;background:var(--bg-op)}
.main-exp{flex:1;overflow-y:auto;padding:16px;background:var(--bg-exp)}
.main-man{flex:1;overflow-y:auto;padding:16px;background:var(--bg-man)}

/* FORM */
.formcard{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:14px}
.formcard-exp{background:var(--s1-exp);border:1px solid var(--bd-exp);border-radius:16px;padding:20px;margin-bottom:14px}
.ftitle{font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;color:var(--am);margin-bottom:14px;
  display:flex;align-items:center;gap:8px}
.ftitle-exp{font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;color:var(--gr);margin-bottom:14px;
  display:flex;align-items:center;gap:8px}
.lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);
  margin-bottom:6px;display:block;margin-top:12px}
.lbl:first-child{margin-top:0}
.lbl-exp{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu-exp);
  margin-bottom:6px;display:block;margin-top:12px}
.lbl-exp:first-child{margin-top:0}
.lbl small{font-size:9px;color:var(--mu);text-transform:none;letter-spacing:0;font-weight:400}
.inp{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);font-size:14px;
  font-weight:600;padding:11px 13px;border-radius:10px;outline:none;font-family:'DM Sans';transition:border-color .15s}
.inp:focus{border-color:var(--am)}
.inp::placeholder{color:var(--mu);font-weight:400}
.inp-exp{width:100%;background:var(--s2-exp);border:1px solid var(--bd-exp);color:var(--tx-exp);font-size:14px;
  font-weight:600;padding:11px 13px;border-radius:10px;outline:none;font-family:'DM Sans';transition:border-color .15s}
.inp-exp:focus{border-color:var(--gr)}
.inp-exp::placeholder{color:var(--mu-exp);font-weight:400}
.inp-exp-placa{font-size:22px;font-weight:800;letter-spacing:4px;text-transform:uppercase}
.prev-end{margin-top:7px;padding:8px 12px;border-radius:8px;display:flex;align-items:center;gap:8px}
.prev-end.hidden{display:none}
.prev-end.ok{background:#22c55e12;border:1px solid #22c55e40}
.prev-end.err{background:#ef444412;border:1px solid #ef444440}
.pfull{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;color:var(--gr);line-height:1}
.pdet{font-size:10px;color:var(--tx2);margin-top:2px}
.aviso-dup{background:#f59e0b14;border:1px solid #f59e0b50;border-radius:8px;padding:10px 13px;
  margin-top:7px;font-size:12px;color:var(--am);line-height:1.6;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.aviso-dup.hidden{display:none}
.aviso-dup b{color:#fff}
.btndup{background:var(--am);border:none;color:#000;font-size:11px;font-weight:700;
  padding:5px 14px;border-radius:6px;cursor:pointer;font-family:'DM Sans'}
.toggle{display:flex;gap:8px;margin-top:4px}
.tbtn{flex:1;padding:10px 8px;border-radius:10px;border:1px solid var(--bd);background:var(--s2);
  color:var(--tx2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'DM Sans';
  display:flex;align-items:center;justify-content:center;gap:6px}
.tbtn.active{background:var(--am);border-color:var(--am);color:#000}
.tbtn.active svg{stroke:#000}
.btn-send{width:100%;padding:14px;background:var(--am);border:none;color:#000;
  font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;border-radius:10px;cursor:pointer;margin-top:16px;
  display:flex;align-items:center;justify-content:center;gap:10px}
.btn-send:hover{filter:brightness(1.1)}
.btn-send-exp{width:100%;padding:14px;background:var(--gr);border:none;color:#000;
  font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;border-radius:10px;cursor:pointer;margin-top:16px;
  display:flex;align-items:center;justify-content:center;gap:10px}
.btn-send-exp:hover{filter:brightness(1.1)}

/* ATRIBUIÇÃO PILLS (expedição) */
.atrib-pills-exp{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.atrib-pill-exp{padding:7px 14px;border-radius:99px;border:1px solid var(--bd-exp);background:var(--s2-exp);
  color:var(--tx2-exp);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  font-family:'DM Sans';transition:all .15s;display:flex;align-items:center;gap:5px}
.atrib-pill-exp:hover{border-color:var(--gr);color:var(--gr)}
.atrib-pill-exp.ativo{background:var(--gr)!important;border-color:var(--gr)!important;color:#000!important}
.atrib-pill-exp.online::after{content:"";width:6px;height:6px;border-radius:50%;background:var(--gr);display:inline-block}

/* GERENCIAR MANOBRISTAS */
.mgmt-card{background:var(--s1-exp);border:1px solid var(--bd-exp);border-radius:14px;padding:14px;margin-bottom:14px}
.mgmt-header{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.mgmt-title{font-family:'Bebas Neue';font-size:15px;letter-spacing:2px;color:var(--gr);display:flex;align-items:center;gap:6px;flex:1}
.mgmt-toggle{font-size:12px;color:var(--mu-exp);transition:transform .2s}
.mgmt-toggle.open{transform:rotate(90deg)}
.mgmt-body{display:none;margin-top:12px}
.mgmt-body.open{display:block}
.mgmt-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.mgmt-item{display:flex;align-items:center;gap:8px;background:var(--s2-exp);border:1px solid var(--bd-exp);border-radius:8px;padding:7px 10px}
.mgmt-nome{flex:1;font-size:13px;font-weight:700;color:var(--tx-exp)}
.mgmt-online{width:7px;height:7px;border-radius:50%;background:var(--gr);animation:blink 2s infinite;flex-shrink:0}
.mgmt-add{display:flex;gap:6px;margin-top:6px}
.mgmt-inp{flex:1;background:var(--s2-exp);border:1px solid var(--bd-exp);color:var(--tx-exp);
  font-size:13px;font-weight:600;padding:9px 12px;border-radius:8px;outline:none;
  font-family:'DM Sans';transition:border-color .15s}
.mgmt-inp:focus{border-color:var(--gr)}
.mgmt-inp::placeholder{color:var(--mu-exp);font-weight:400}
.mgmt-btn-add{background:var(--gr);border:none;color:#000;font-family:'Bebas Neue';font-size:15px;
  letter-spacing:1px;padding:9px 16px;border-radius:8px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
.mgmt-btn-add:disabled{opacity:.4;cursor:not-allowed}

/* SECAO */
.secao{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--mu);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.secao-exp{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--mu-exp);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--bd-exp)}

/* TRANSPORTADORA GROUP */
.transp-grp{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--gr);margin:14px 0 8px;padding:6px 10px;border-radius:8px;
  background:var(--s2-exp);border:1px solid var(--bd-exp);
  display:flex;align-items:center;gap:8px}
.transp-count{background:#22c55e22;border:1px solid #22c55e44;color:var(--gr);
  border-radius:99px;font-size:10px;padding:1px 8px;margin-left:auto}

/* CARDS REPOSITOR */
.crep{background:var(--s1);border:1px solid var(--bd);border-left:3px solid;border-radius:14px;
  padding:13px;margin-bottom:9px;animation:si .2s ease}
@keyframes si{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.crep-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.crep-addr{font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;flex:1}
.crep-prod{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:4px}
.crep-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px}
.chip{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  padding:3px 8px;border-radius:99px;border:1px solid;display:inline-flex;align-items:center;gap:4px}
.tbadge{font-size:10px;font-weight:800;letter-spacing:1px;padding:3px 10px;border-radius:99px;border:1px solid;
  display:inline-flex;align-items:center;gap:5px}
.btn-rem{background:transparent;border:none;color:var(--mu);cursor:pointer;padding:4px;
  display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s}
.btn-rem:hover{color:var(--rd);background:#ef444415}
.btn-limpar{width:100%;padding:10px;background:transparent;border:1px solid var(--bd);
  color:var(--mu);border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;margin-top:6px;
  display:flex;align-items:center;justify-content:center;gap:6px}
.btn-limpar:hover{border-color:var(--rd);color:var(--rd)}
.btn-limpar-exp{width:100%;padding:10px;background:transparent;border:1px solid var(--bd-exp);
  color:var(--mu-exp);border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;margin-top:6px;
  display:flex;align-items:center;justify-content:center;gap:6px}
.btn-limpar-exp:hover{border-color:var(--rd);color:var(--rd)}

/* OPERADOR BADGE no card */
.op-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:99px;border:1px solid #8b5cf640;background:#8b5cf615;color:#a78bfa}
.btn-transfer{background:transparent;border:1px solid var(--bd);color:var(--tx2);cursor:pointer;
  padding:4px 8px;display:flex;align-items:center;gap:4px;border-radius:6px;
  font-size:10px;font-weight:700;transition:all .15s;white-space:nowrap}
.btn-transfer:hover{border-color:var(--pu);color:#a78bfa;background:#8b5cf615}

/* CARD EXPEDIÇÃO */
.cexp{background:var(--s1-exp);border:1px solid var(--bd-exp);border-left:3px solid;border-radius:14px;
  padding:13px;margin-bottom:9px;animation:si .2s ease}
.cexp-placa{font-family:'Bebas Neue';font-size:24px;letter-spacing:3px;flex:1}
.cexp-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px}
.btn-liberar{background:var(--gr);border:none;color:#000;font-family:'DM Sans';font-size:11px;font-weight:800;
  padding:6px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:filter .15s}
.btn-liberar:hover{filter:brightness(1.1)}
.man-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:99px;border:1px solid #22c55e40;background:#22c55e15;color:#6ee7b7}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:18px;
  padding:24px;width:100%;max-width:340px;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;color:var(--tx);
  margin-bottom:6px;display:flex;align-items:center;gap:8px}
.modal-sub{font-size:12px;color:var(--tx2);margin-bottom:18px;line-height:1.5}
.modal-ops{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.modal-op-btn{background:var(--s2);border:1px solid var(--bd);border-radius:10px;
  padding:12px 14px;cursor:pointer;transition:all .15s;text-align:left;
  display:flex;align-items:center;gap:10px;color:var(--tx)}
.modal-op-btn:hover{border-color:var(--pu);background:#8b5cf610}
.modal-op-nome{font-size:14px;font-weight:700}
.modal-op-info{font-size:11px;color:var(--tx2);margin-top:2px}
.modal-cancel{width:100%;padding:10px;background:transparent;border:1px solid var(--bd);
  color:var(--tx2);border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Sans'}

/* ALERTAS */
.alerta{background:#ef444414;border:1px solid #ef444440;border-left:3px solid var(--rd);
  border-radius:10px;padding:12px 14px;margin:10px 16px 0;
  display:flex;align-items:flex-start;gap:10px;animation:si .2s ease}
.adot{width:8px;height:8px;border-radius:50%;background:var(--rd);flex-shrink:0;margin-top:4px;animation:blink 1s infinite}
.alerta b{font-size:13px}
.alerta span{font-size:12px;color:var(--tx2)}
.alerta small{font-size:10px;color:var(--mu)}
.alerta-close{background:transparent;border:none;color:var(--mu);cursor:pointer;
  display:flex;align-items:center;padding:2px;flex-shrink:0}

/* CARD OPERADOR PRINCIPAL */
.cop-main{background:var(--s1-op);border:2px solid var(--am);border-radius:18px;padding:22px 20px;
  margin-bottom:12px;position:relative;overflow:hidden;transition:transform .15s,opacity .15s;
  animation:si .2s ease;touch-action:pan-y}
.swipe-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;opacity:0;pointer-events:none;white-space:nowrap;color:var(--gr)}
.tipo-main{font-family:'Bebas Neue';font-size:24px;letter-spacing:3px;display:flex;align-items:center;gap:10px}
.addr-main{font-family:'Bebas Neue';font-size:var(--addr-size);letter-spacing:var(--addr-sp);
  color:var(--am);line-height:1;margin:10px 0 12px;word-break:break-all}
.desc-main{font-size:16px;font-weight:700;color:var(--tx-op);margin-bottom:3px}
.cod-main{font-size:13px;color:var(--tx2-op);margin-bottom:8px}
.op-btns{display:flex;gap:8px;margin-top:16px}
.abtn{flex:1;padding:14px 6px;border-radius:10px;border:none;font-family:'DM Sans';
  font-size:13px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:7px}
.abtn:active{filter:brightness(.9);transform:scale(.98)}
.abtn-blue{background:var(--bl);color:#fff}
.abtn-green{background:var(--gr);color:#000}
.abtn-red{background:var(--rd);color:#fff}
.abtn-gray{background:#1a2040;color:#6b7aa0;border:1px solid #2a3060}
.sdica2{text-align:center;font-size:10px;color:var(--mu-op);margin-top:10px;
  display:flex;align-items:center;justify-content:center;gap:6px}

.cman-main{background:var(--s1-man);border:2px solid var(--pu);border-radius:18px;padding:22px 20px;
  margin-bottom:12px;position:relative;overflow:hidden;transition:transform .15s,opacity .15s;
  animation:si .2s ease;touch-action:pan-y}
.cman-main.liberado{border-color:var(--gr);animation:si .2s ease, pulsar 1.5s ease-in-out infinite}

.cman-main.encostado{border-color:var(--bl)}
.placa-main{font-family:'Bebas Neue';font-size:var(--addr-size);letter-spacing:var(--addr-sp);
  color:var(--pu);line-height:1;margin:8px 0 12px;word-break:break-all}
.placa-main.liberado{color:var(--gr)}
.placa-main.encostado{color:var(--bl)}
.doca-main{font-size:18px;font-weight:700;color:var(--tx-man);margin-bottom:3px}
.transp-main{font-size:13px;color:var(--tx2-man);margin-bottom:8px}
.liberado-banner{background:#22c55e15;border:1px solid #22c55e40;border-radius:12px;
  padding:14px;text-align:center;margin:10px 0}
.liberado-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:3px;color:var(--gr)}
.liberado-sub{font-size:11px;color:#22c55e80;margin-top:4px}
.aguardando-banner{background:#3b82f615;border:1px solid #3b82f640;border-radius:10px;
  padding:10px 14px;text-align:center;margin-bottom:10px}

/* CARD SEC */
.cop-sec{background:var(--s2-op);border:1px solid var(--bd-op);border-radius:12px;
  padding:13px 14px;margin-bottom:8px;opacity:.5;position:relative;overflow:hidden;touch-action:pan-y}
.cman-sec{background:var(--s2-man);border:1px solid var(--bd-man);border-radius:12px;
  padding:13px 14px;margin-bottom:8px;opacity:.5;position:relative;overflow:hidden}

/* HIST */
.chist{background:var(--s2-op);border:1px solid var(--bd-op);border-left:3px solid;
  border-radius:10px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:8px;opacity:.6}
.chist-exp{background:var(--s2-exp);border:1px solid var(--bd-exp);border-left:3px solid;
  border-radius:10px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:8px;opacity:.6}

/* DICA */
.sdica{background:var(--s1-op);border:1px solid var(--bd-op);border-radius:10px;
  padding:10px 14px;margin-bottom:14px;font-size:11px;color:var(--tx2-op);line-height:1.8;text-align:center}
.sdica b{color:var(--tx-op)}
.sdica-man{background:var(--s1-man);border:1px solid var(--bd-man);border-radius:10px;
  padding:10px 14px;margin-bottom:14px;font-size:11px;color:var(--tx2-man);line-height:1.8;text-align:center}
.sdica-man b{color:var(--tx-man)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--mu-op)}
.empty-exp{text-align:center;padding:60px 20px;color:var(--mu-exp)}
.empty-man{text-align:center;padding:60px 20px;color:var(--mu-man)}
.empty-icon-wrap{width:64px;height:64px;border-radius:50%;background:var(--s2-op);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty-icon-wrap-exp{width:64px;height:64px;border-radius:50%;background:var(--s2-exp);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty-icon-wrap-man{width:64px;height:64px;border-radius:50%;background:var(--s2-man);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;margin-bottom:6px;color:var(--tx2-op)}
.empty-sub{font-size:12px;line-height:1.7}
.hidden{display:none!important}
</style>

const FONT_SIZES = { P:42, M:56, G:72, GG:92 };
function fontKey()    { return "repoapp-font-"+(perfil||"op"); }
function fontPreset() { const s=localStorage.getItem(fontKey()); return (s&&FONT_SIZES[s])?s:"Auto"; }
function fontPx() {
  const p=fontPreset();
  if(p==="Auto"){const w=window.innerWidth;if(w<=360)return 48;if(w<=414)return 58;if(w<=768)return 68;return 80;}
  return FONT_SIZES[p];
}
function applyFont() {
  const px=fontPx();
  document.documentElement.style.setProperty("--addr-size",px+"px");
  document.documentElement.style.setProperty("--addr-sp",Math.max(2,Math.round(px*.07))+"px");
}
window.addEventListener("resize",()=>{if(fontPreset()==="Auto")applyFont();});

function tempoFila(ts){const m=Math.floor((Date.now()-ts)/60000);if(m<1)return "agora";if(m<60)return m+"min";const h=Math.floor(m/60),r=m%60;return r?h+"h "+r+"min":h+"h";}
function corTempo(ts){const m=Math.floor((Date.now()-ts)/60000);return m<5?"var(--gr)":m<15?"var(--am)":"var(--rd)";}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// ── PARSER ───────────────────────────────────────────────────────────────────
function isPickingEnd(endCompleto){
  const s=(endCompleto||"").trim().toUpperCase();
  if(s.startsWith("F "))return true;
  return /\s10$/i.test(s);
}
function parseEnd(s,camara){
  camara=(camara||camaraAtual||"B").toUpperCase();
  s=(s||"").trim();
  if(!s)return{valido:false,erro:""};
  const cam=CAMARAS[camara];
  if(!cam)return{valido:false,erro:"Câmara inválida"};
  if(cam.especial){
    const p=s.split(/[-\/\s]+/).filter(Boolean);
    if(p.length!==2)return{valido:false,erro:'Câmara F: use RUA-POSIÇÃO  ex: "1-2"'};
    const rua=+p[0],pos=+p[1];
    if(isNaN(rua)||isNaN(pos))return{valido:false,erro:"Apenas números"};
    if(rua<1||rua>9)return{valido:false,erro:"Rua: 1 a 9"};
    if(pos<1||pos>99)return{valido:false,erro:"Posição: 1 a 99"};
    const completo=`F ${String(rua).padStart(2,"0")} ${String(pos).padStart(3,"0")}`;
    return{valido:true,completo,erro:"",camara:"F",rua,pos,nivel:null,label:`Câmara F · Rua ${rua} · Posição ${pos}`,isPicking:true};
  }
  const reCompleto=/^([A-F])\s+(\d{2,3})\s+(\d{3,4})\s+(\d{2})$/i;
  const mC=s.match(reCompleto);
  if(mC){
    const[,letra,rua,pos,nivel]=mC;
    const isPicking=nivel==="10";
    return{valido:true,completo:`${letra.toUpperCase()} ${rua.padStart(3,"0")} ${pos.padStart(4,"0")} ${nivel}`,erro:"",camara:letra.toUpperCase(),rua:+rua,pos:+pos,nivel:+nivel/10,label:`${CAMARAS[letra.toUpperCase()]?.nome||letra} · Rua ${+rua} · Pos ${+pos} · ${nivel}`,isPicking};
  }
  let input=s;
  const mLetra=input.match(/^([A-F])\s*[-\/\s]?(.*)/i);
  if(mLetra)input=mLetra[2];
  const p=input.split(/[-\/\s]+/).filter(Boolean);
  if(p.length!==3)return{valido:false,erro:'Use: RUA-POSIÇÃO-NÍVEL  ex: "4-56-2"'};
  const rua=+p[0],pos=+p[1],nivel=+p[2];
  if(isNaN(rua)||isNaN(pos)||isNaN(nivel))return{valido:false,erro:"Apenas números"};
  if(rua<1||rua>9)return{valido:false,erro:"Rua: 1 a 9"};
  if(pos<1||pos>99)return{valido:false,erro:"Posição: 1 a 99"};
  if(nivel<1||nivel>5)return{valido:false,erro:"Nível: 1–5"};
  const nivelLabel=["","Nível 10 — chão","2º nível","3º nível","4º nível","5º nível"][nivel];
  const completo=`${camara} ${String(rua).padStart(3,"0")} ${String(pos).padStart(4,"0")} ${String(nivel*10).padStart(2,"0")}`;
  const isPicking=nivel===1;
  return{valido:true,completo,erro:"",camara,rua,pos,nivel,label:`${cam.nome} · Rua ${rua} · Pos ${pos} · ${nivelLabel}`,isPicking};
}

// ── SOM ──────────────────────────────────────────────────────────────────────
function beep(freq=880,times=2){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();Array.from({length:times},(_,i)=>i*.18).forEach(d=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type="sine";g.gain.setValueAtTime(0,ctx.currentTime+d);g.gain.linearRampToValueAtTime(.4,ctx.currentTime+d+.01);g.gain.linearRampToValueAtTime(0,ctx.currentTime+d+.12);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.15);});}catch{}}
function beepLib(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[[880,.0],[1047,.2],[1319,.4]].forEach(([freq,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type="sine";g.gain.setValueAtTime(0,ctx.currentTime+d);g.gain.linearRampToValueAtTime(.4,ctx.currentTime+d+.01);g.gain.linearRampToValueAtTime(0,ctx.currentTime+d+.18);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.22);});}catch{}}

// ── SWIPE ────────────────────────────────────────────────────────────────────
function initSwipe(el,onRight){
  let sx=0,sy=0,dx=0,moving=false;
  el.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dx=0;moving=false;},{passive:true});
  el.addEventListener("touchmove",e=>{
    dx=e.touches[0].clientX-sx;const dy=e.touches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){
      moving=true;if(dx>0){el.style.transform=`translateX(${dx}px)`;el.style.opacity=`${1-Math.min(dx/200,.4)}`;
      const h=el.querySelector(".swipe-hint");if(h){h.textContent="CONCLUÍDO";h.style.opacity=Math.min(dx/80,1);}}
    }
  },{passive:true});
  el.addEventListener("touchend",()=>{
    if(moving&&dx>80){onRight();return;}
    el.style.transform="";el.style.opacity="";
    const h=el.querySelector(".swipe-hint");if(h){h.textContent="";h.style.opacity=0;}
  });
}

function cardRep(t){
  const cor={pendente:"#f59e0b",andamento:"#3b82f6",concluido:"#22c55e",vazio:"#ef4444",pulado:"#8892b0"}[t.status];
  const lbl={pendente:"Pendente",andamento:"Em andamento",concluido:"Concluído",vazio:"End. vazio",pulado:"Pulado"}[t.status];
  const isHist=["concluido","vazio"].includes(t.status);
  const tipoCor=t.tipo==="picking"?"#f59e0b":"#3b82f6";
  const tipoTxt=t.tipo==="picking"?"Pick":"Pal";
  // Linha de meta compacta: tipo · atribuição/operador · hora · tempo
  const metaParts=[
    `<span style="font-size:9px;font-weight:800;color:${tipoCor}">${tipoTxt}</span>`,
    t.atribNome&&t.status==="pendente"?`<span style="font-size:10px;color:#a78bfa">→ ${t.atribNome}</span>`:"",
    t.opNome&&t.status!=="pendente"?`<span style="font-size:10px;color:#a78bfa">${t.opNome}</span>`:"",
    `<span style="font-size:10px;color:var(--mu)">${fmtHora(t.ts)}</span>`,
    !isHist?`<span style="font-size:10px;font-weight:700;color:${corTempo(t.ts)}">${tempoFila(t.ts)}</span>`:"",
  ].filter(Boolean).join(`<span style="color:var(--mu);font-size:9px;margin:0 1px">·</span>`);
  return `
    <div class="crep" style="border-left-color:${cor}${isHist?";opacity:.6":""}">
      <div style="display:flex;align-items:flex-start;gap:8px">
        <div style="flex:1;min-width:0">
          <div class="crep-addr" style="color:${cor};font-size:22px">${t.endereco}</div>
          <div class="crep-meta" style="margin-top:5px;gap:4px">${metaParts}</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;margin-top:2px">
          <span class="chip" style="color:${cor};border-color:${cor}40;background:${cor}15">${lbl}</span>
          ${!isHist&&Object.keys(operadores).length>1?`<button class="btn-transfer" onclick="window.abrirRepassar('${t.id}')">${I.transfer}</button>`:""}
          ${!isHist?`<button class="btn-rem" onclick="window.remover('${t.id}')">${I.x}</button>`:""}
        </div>
      </div>
    </div>`;
}

// ── RENDER OPERADOR ───────────────────────────────────────────────────────────
function renderOperador(){
  const minhasFila=tarefas.filter(t=>{
    if(!["pendente","andamento","pulado"].includes(t.status))return false;
    if(t.atribId&&t.atribId!==opId)return false;
    if(t.status==="andamento"&&t.opId&&t.opId!==opId)return false;
    return true;
  });
  const ativos=minhasFila.filter(t=>t.status==="pendente"||t.status==="andamento").sort((a,b)=>a.ts-b.ts);
  const pulados=minhasFila.filter(t=>t.status==="pulado").sort((a,b)=>a.ts-b.ts);
  const fila=[...ativos,...pulados];
  const hist=tarefas.filter(t=>t.status==="concluido"||t.status==="vazio");
  const getRua=t=>{const m=t.endereco.match(/B\s+0*(\d+)/);return m?m[1]:null;};
  const ruasNaFila=[...new Set(fila.map(getRua).filter(Boolean))].sort();
  const filaFiltrada=filtroRua==="todas"?fila:fila.filter(t=>getRua(t)===filtroRua);
  const filtroBarHTML=ruasNaFila.length>1?`
    <div class="filtro-bar">
      <button class="filtro-btn${filtroRua==="todas"?" filtro-ativo":""}" onclick="window.setFiltroRua('todas')">${I.map} Todas</button>
      ${ruasNaFila.map(r=>`
        <button class="filtro-btn${filtroRua===r?" filtro-ativo":""}" onclick="window.setFiltroRua('${r}')">
          Rua ${r}<span class="filtro-n">${fila.filter(t=>getRua(t)===r).length}</span>
        </button>`).join("")}
    </div>`:"";
  const statsHTML=fila.length>0?`
    <div class="stat-row">
      <div class="stat-card stat-card-op"><div class="stat-num" style="color:var(--am)">${fila.length}</div><div class="stat-lbl">Minha fila</div></div>
      <div class="stat-card stat-card-op"><div class="stat-num" style="color:var(--bl)">${fila.filter(t=>t.tipo==="palete").length}</div><div class="stat-lbl">Paletes</div></div>
      <div class="stat-card stat-card-op"><div class="stat-num" style="color:var(--am)">${fila.filter(t=>t.tipo==="picking").length}</div><div class="stat-lbl">Pickings</div></div>
      <div class="stat-card stat-card-op"><div class="stat-num" style="color:var(--gr)">${hist.filter(t=>t.status==="concluido"&&t.opId===opId).length}</div><div class="stat-lbl">Fiz hoje</div></div>
    </div>`:"";
  const filaHTML=fila.length===0
    ?`<div class="empty"><div class="empty-icon-wrap">${I.inbox.replace('stroke="currentColor"','stroke="var(--mu-op)"')}</div><div class="empty-title">Sem tarefas</div><div class="empty-sub">Aguardando reposições atribuídas a você<br>ou disponíveis para qualquer operador.</div></div>`
    :statsHTML+(filaFiltrada.length===0
      ?`<div class="empty" style="padding:30px 20px"><div class="empty-icon-wrap">${I.search.replace('stroke="currentColor"','stroke="var(--mu-op)"')}</div><div class="empty-title">Nenhum na Rua ${filtroRua}</div><div class="empty-sub">Selecione outra rua ou "Todas".</div></div>`
      :filaFiltrada.map((t,i)=>cardOp(t,i)).join(""));
  document.getElementById("app").innerHTML=`
    <div class="topbar-op">
      <span class="tlogo">REPO</span>
      <span class="trole oper">${I.forklift} Operador</span>
      <span class="op-nome-badge">${nomeOperador}</span>
      <span class="tsp"></span>
      <span class="tlive"><span class="dot"></span>ao vivo</span>
      <span class="tver">${APP_VERSION}</span>
      <button class="tbtn-icon" onclick="window.toggleFont()">${I.settings}</button>
      <button class="tbtn-out" onclick="window.sair()">${I.logout} Sair</button>
    </div>
    ${fontPanelHTML(true)}
    ${filtroBarHTML}
    <div class="main-op">
      ${filaHTML}
      ${filaFiltrada.length>0?`<div class="sdica">${I.swipe} Arraste para direita para <b>concluir</b> &nbsp;·&nbsp; ${I.tap} Toque em <b>Concluído</b></div>`:""}
      ${hist.length>0?`
        <div class="secao">Concluídas hoje (${hist.length})</div>
        ${hist.map(t=>`
          <div class="chist" style="border-left-color:${t.status==="concluido"?"var(--gr)":"var(--rd)"}">
            <span style="font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;color:${t.status==="concluido"?"var(--gr)":"var(--rd)"}">${t.endereco}</span>
            <span style="margin-left:auto;display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mu-op)">
              ${t.opNome?`<span style="color:#a78bfa">${t.opNome}</span> ·`:""}
              ${t.status==="concluido"?I.checkCircle.replace('stroke="currentColor"','stroke="var(--gr)"'):I.alert.replace('stroke="currentColor"','stroke="var(--rd)"')}
              ${fmtHora(t.ts)}
            </span>
          </div>`).join("")}`:""}
    </div>`;
  filaFiltrada.forEach(t=>{
    const el=document.getElementById("op-"+t.id);
    if(el)initSwipe(el,()=>window.acao(t.id,"concluido"));
  });
  clearInterval(window._timerOp);
  window._timerOp=setInterval(()=>{
    document.querySelectorAll(".tempo-op").forEach(el=>{
      const ts=+el.dataset.ts;if(ts){el.textContent=tempoFila(ts);el.style.color=corTempo(ts);}
    });
  },30000);
}

function cardOp(t,i){
  const isFirst=i===0,isPulado=t.status==="pulado";
  const tipoCor=t.tipo==="picking"?"#f59e0b":"#3b82f6";
  const tipoIcon=t.tipo==="picking"?I.package:I.layers;
  const tipoTxt=t.tipo==="picking"?"PICKING":"PALETE FECHADO";
  const foiAtrib=t.atribId===opId;
  if(isFirst){
    const addrCor=isPulado?"#8892b0":"var(--am)";
    return `
      <div id="op-${t.id}" class="cop-main" style="${isPulado?"border-color:#8892b0;opacity:.7":""}">
        <div class="swipe-hint"></div>
        <div class="tipo-main" style="color:${tipoCor}">${tipoIcon} ${tipoTxt}${foiAtrib?` <span style="font-size:11px;color:#a78bfa;background:#8b5cf615;border:1px solid #8b5cf640;border-radius:99px;padding:2px 8px;font-family:'DM Sans';font-weight:700;letter-spacing:0">Para você</span>`:""}</div>
        <div class="addr-main" style="color:${addrCor}">${t.endereco}</div>
        ${t.descricao?`<div class="desc-main">${t.descricao}</div>`:""}
        ${t.codigo?`<div class="cod-main">${t.codigo}</div>`:""}
        <div class="op-btns">
          ${t.status==="andamento"&&t.opId===opId
            ?`<button class="abtn abtn-green" onclick="window.acao('${t.id}','concluido')">${I.check} Concluído</button>
               <button class="abtn abtn-red" onclick="window.acao('${t.id}','vazio')">${I.alert} Vazio</button>
               <button class="abtn abtn-gray" onclick="window.pular('${t.id}')">${I.skip}</button>`
            :`<button class="abtn abtn-blue" onclick="window.acao('${t.id}','andamento')">${I.receive} Pegar</button>
               <button class="abtn abtn-gray" onclick="window.pular('${t.id}')">${I.skip} Pular</button>`}
        </div>
        <div class="sdica2">${I.swipe} Deslize para concluir</div>
      </div>`;
  }
  return `
    <div id="op-${t.id}" class="cop-sec">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--mu-op)">${t.endereco}</span>
        <span style="font-size:9px;font-weight:700;color:${tipoCor}">${t.tipo==="picking"?"PICK":"PAL"}</span>
        <span class="tempo-op" data-ts="${t.ts}" style="margin-left:auto;font-size:10px;font-weight:700;color:${corTempo(t.ts)}">${tempoFila(t.ts)}</span>
      </div>
      ${t.descricao?`<div style="font-size:11px;color:var(--mu-op);margin-top:3px">${t.descricao}</div>`:""}
    </div>`;
}

        <div class="secao" style="color:var(--mu-man);border-color:var(--bd-man)">Concluídos hoje (${hist.length})</div>

          <div class="chist-exp" style="border-left-color:${c.status==="concluido"?"var(--gr)":"var(--rd)"}">
            <span style="font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;color:${c.status==="concluido"?"var(--gr)":"var(--rd)"}">${c.placa}</span>

function cardManSec(c){

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  applyFont();
  if(!perfil)                                        renderLogin();
  else if(perfil==="repositor")                      renderRepositor();
  else if(perfil==="operador"&&!nomeOperador)        renderNomeOperador();
  else if(perfil==="operador")                       renderOperador();
  else if(perfil==="expedicao")                      renderExpedicao();
  else if(perfil==="manobrista"&&!nomeManob)         renderNomeManob();
  else if(perfil==="manobrista")                     renderManobrista();
}

// ── PRESENÇA (picking) ────────────────────────────────────────────────────────
function registrarOperador(){
  if(!opId||!nomeOperador)return;
  const opRef=ref(db,`operadores/${opId}`);
  set(opRef,{nome:nomeOperador,ts:Date.now()});
  window._opRef=opRef;
}
function removerOperador(){if(window._opRef)remove(window._opRef).catch(()=>{});}

// ── PRESENÇA (manobrista) ─────────────────────────────────────────────────────
function registrarManobrista(){
  if(!manobId||!nomeManob)return;
  const mRef=ref(db,`manobristas/${manobId}`);
  set(mRef,{nome:nomeManob,ts:Date.now()});
  window._manRef=mRef;
}
function removerManobrista(){if(window._manRef)remove(window._manRef).catch(()=>{});}

// ── AÇÕES GERAIS ──────────────────────────────────────────────────────────────
window.escolher=p=>{
  perfil=p;showFont=false;prevIds=null;filtroRua="todas";prevCarrIds=null;prevLibIds=[];
  if(p==="repositor"){nomeOperador=null;opId=null;}
  if(p==="expedicao"){atribManob="qualquer";mgmtOpen=false;}
  render();
};

window.confirmarNome=()=>{
  const nome=document.getElementById("inputNome")?.value.trim();
  if(!nome)return;
  nomeOperador=nome;opId=uid();
  registrarOperador();render();
};

window.confirmarNomeManob=()=>{
  const nome=document.getElementById("inputNomeManob")?.value.trim();
  if(!nome)return;
  nomeManob=nome;manobId=uid();
  registrarManobrista();render();
};

window.selecionarNomeManob=nome=>{
  const inp=document.getElementById("inputNomeManob");
  if(inp){inp.value=nome;document.getElementById("btnEntrarManob").disabled=false;}
};

window.sair=()=>{
  clearInterval(window._timerOp);
  if(perfil==="operador")removerOperador();
  if(perfil==="manobrista")removerManobrista();
  perfil=null;nomeOperador=null;opId=null;nomeManob=null;manobId=null;showFont=false;
  render();
};

// ── AÇÕES PICKING ─────────────────────────────────────────────────────────────
window.setFiltroRua=r=>{filtroRua=r;render();};
window.toggleFont=()=>{showFont=!showFont;render();};
window.setAtrib=v=>{
  atribPara=v;
  document.querySelectorAll(".atrib-pill").forEach(el=>{
    const txt=el.textContent.trim();
    const isQualquer=v==="qualquer"&&txt.includes("Qualquer");
    const isOp=!isQualquer&&operadores[v]&&txt.includes(operadores[v].nome);
    el.classList.toggle("ativo",isQualquer||isOp);
  });
};

window.setCamara=c=>{
  camaraAtual=c;
  // Atualiza tabs
  document.querySelectorAll(".cam-tab").forEach(btn=>{
    // Extrai letra da aba pelo texto (formato "X — Nome")
    const txt=btn.textContent.trim();
    const k=txt.split("—")[0].trim();
    const cam=CAMARAS[k];if(!cam)return;
    const isAtiva=k===c;
    btn.classList.toggle("ativa",isAtiva);
    btn.style.color=isAtiva?cam.cor:"var(--tx2)";
  });
  // Scroll ativa para o centro
  const bar=document.getElementById("camTabBar");
  const ativa=bar?.querySelector(".cam-tab.ativa");
  if(bar&&ativa)bar.scrollLeft=ativa.offsetLeft-(bar.clientWidth/2)+(ativa.clientWidth/2);
  // Atualiza placeholder e label
  const fEnd=document.getElementById("fEnd");
  if(fEnd){fEnd.placeholder=CAMARAS[c]?.especial?"1-2":"4-56-2";fEnd.value="";}
  const elP=document.getElementById("prevEnd"),elA=document.getElementById("avisoEnd");
  if(elP)elP.className="prev-end hidden";if(elA)elA.className="aviso-dup hidden";
  window._endForcar=null;
};

window.setFont=preset=>{
  localStorage.setItem(fontKey(),preset);applyFont();
  document.querySelectorAll(".font-btn").forEach(b=>b.classList.toggle("ativo",b.dataset.preset===preset));
  const prev=document.getElementById("fontPreview");
  if(prev){const px=fontPx(),sp=Math.max(2,Math.round(px*.07));prev.style.fontSize=px+"px";prev.style.letterSpacing=sp+"px";}
};

window.setTipo=t=>{
  tipoAtual=t;
  document.getElementById("tPick")?.classList.toggle("active",t==="picking");
  document.getElementById("tPal")?.classList.toggle("active",t==="palete");
};

window.onEnd=v=>{
  const elP=document.getElementById("prevEnd"),elA=document.getElementById("avisoEnd");
  if(!elP)return;
  if(!v.trim()){elP.className="prev-end hidden";if(elA)elA.className="aviso-dup hidden";return;}
  const r=parseEnd(v,camaraAtual);
  const cam=CAMARAS[camaraAtual]||CAMARAS.B;
  if(r.valido){
    if(r.isPicking){
      elP.className="prev-end err";
      elP.innerHTML=`<span style="color:var(--am)">${I.alert}</span><div><div class="pfull" style="color:var(--am)">${r.completo}</div><div class="pdet" style="color:var(--am);font-weight:700;margin-top:4px">${cam.especial?"Câmara F — nível de chão":"Nível 10 — picking de chão"}</div><div class="pdet" style="margin-top:3px">Este endereço já está acessível no chão.<br>O operador de empilhadeira não é necessário.</div></div>`;
      if(elA)elA.className="aviso-dup hidden";window._endForcar=null;return;
    }
    elP.className="prev-end ok";
    elP.innerHTML=`<span style="color:var(--gr)">${I.check}</span><div><div class="pfull" style="color:${cam.cor}">${r.completo}</div>${r.label?`<div class="pdet" style="margin-top:3px">${r.label}</div>`:""}</div>`;
    const dup=tarefas.find(t=>t.endereco===r.completo&&["pendente","andamento","pulado"].includes(t.status));
    if(elA){
      if(dup){elA.className="aviso-dup";elA.innerHTML=`${I.alert} Endereço já na fila como <b>${{pendente:"Pendente",andamento:"Em andamento",pulado:"Pulado"}[dup.status]}</b>. <button class="btndup" onclick="window.enviarForcar()">Enviar mesmo assim</button>`;window._endForcar=r.completo;}
      else{elA.className="aviso-dup hidden";window._endForcar=null;}
    }
  }else{
    elP.className="prev-end err";
    elP.innerHTML=`<span style="color:var(--rd)">${I.x}</span><span style="font-size:11px;color:var(--rd)">${r.erro}</span>`;
    if(elA)elA.className="aviso-dup hidden";
  }
};

async function doPush(endCompleto){
  window._fs=null;window._endForcar=null;
  await push(tasksRef,{endereco:endCompleto,tipo:tipoAtual,status:"pendente",ts:Date.now(),
    atribId:atribPara!=="qualquer"?atribPara:null,
    atribNome:atribPara!=="qualquer"?(operadores[atribPara]?.nome||null):null,
  });
}

window.enviar=async()=>{
  const r=parseEnd(document.getElementById("fEnd")?.value||"",camaraAtual);
  if(!r.valido){alert(r.erro||"Endereço inválido");return;}
  if(r.isPicking){alert("Endereço de chão — o operador não é necessário.");return;}
  const elA=document.getElementById("avisoEnd");
  if(elA&&!elA.classList.contains("hidden")&&window._endForcar)return;
  await doPush(r.completo);
};
window.enviarForcar=async()=>{const r=parseEnd(document.getElementById("fEnd")?.value||"",camaraAtual);if(r.valido&&!r.isPicking)await doPush(r.completo);};

window.acao=async(id,status)=>{
  try{
    const updates={status};
    if(status==="andamento"){updates.opId=opId;updates.opNome=nomeOperador;}
    await update(ref(db,`tarefas/${id}`),updates);
  }catch(e){alert("Erro: "+e.message);}
};
window.pular=async id=>{try{await update(ref(db,`tarefas/${id}`),{status:"pulado",ts:Date.now()});}catch(e){alert("Erro: "+e.message);}};
window.remover=async id=>{if(!confirm("Remover esta tarefa?"))return;try{await remove(ref(db,`tarefas/${id}`));}catch(e){alert("Erro: "+e.message);}};
window.fecharAlerta=async id=>{try{await update(ref(db,`tarefas/${id}`),{alertaVisto:true});}catch{}document.getElementById("al-"+id)?.remove();};
window.limparTudo=async()=>{if(!confirm("Limpar todas as tarefas?"))return;try{await remove(tasksRef);}catch(e){alert("Erro: "+e.message);}};

// ── AÇÕES EXPEDIÇÃO ───────────────────────────────────────────────────────────
window.setAtribManob=nome=>{

  document.querySelectorAll(".atrib-pill-exp").forEach(el=>{
    const txt=el.textContent.trim().replace(/\s+/g," ");

window.toggleMgmt=()=>{
  mgmtOpen=!mgmtOpen;
  const body=document.querySelector(".mgmt-body");
  const tog=document.querySelector(".mgmt-toggle");
  if(body)body.classList.toggle("open",mgmtOpen);
  if(tog)tog.classList.toggle("open",mgmtOpen);
};

window.adicionarManob=async()=>{
  const nome=document.getElementById("inputNovoManob")?.value.trim();
  if(!nome)return;
  const jaExiste=Object.values(nomesManobristas).some(n=>n.toLowerCase()===nome.toLowerCase());
  if(jaExiste){alert("Este nome já está cadastrado.");return;}

    await push(nomesManobRef,nome);
    const inp=document.getElementById("inputNovoManob");
    if(inp){inp.value="";document.getElementById("btnAddManob").disabled=true;}

window.removerManobNome=async id=>{
  if(!confirm("Remover este manobrista da lista?"))return;
  try{await remove(ref(db,`nomesManobristas/${id}`));}catch(e){alert("Erro: "+e.message);}
};

window.enviarCarreg=async()=>{
  const placa=(document.getElementById("fPlaca")?.value||"").trim().toUpperCase();
  const doca=(document.getElementById("fDoca")?.value||"").trim();
  const transp=(document.getElementById("fTransp")?.value||"").trim();
  if(!placa){alert("Informe a placa do veículo.");return;}
  if(!doca){alert("Informe a doca.");return;}
  try{
    await push(carregRef,{
      placa,doca,transportadora:transp||"Sem transportadora",
      status:"pendente",ts:Date.now(),
      manobNome:atribManob!=="qualquer"?atribManob:null,
    });
    document.getElementById("fPlaca").value="";
    document.getElementById("fDoca").value="";
    document.getElementById("fTransp").value="";
    atribManob="qualquer";
    document.querySelectorAll(".atrib-pill-exp").forEach((el,i)=>el.classList.toggle("ativo",i===0));
  }catch(e){alert("Erro: "+e.message);}
};

window.liberarCarreg=async id=>{
  try{await update(ref(db,`carregamentos/${id}`),{status:"liberado"});}catch(e){alert("Erro: "+e.message);}
};

window.removerCarreg=async id=>{
  if(!confirm("Remover este veículo?"))return;
  try{await remove(ref(db,`carregamentos/${id}`));}catch(e){alert("Erro: "+e.message);}
};

window.limparCarreg=async()=>{
  if(!confirm("Limpar histórico de carregamentos?"))return;
  const conc=carregamentos.filter(c=>["concluido","problema"].includes(c.status));
  try{await Promise.all(conc.map(c=>remove(ref(db,`carregamentos/${c.id}`))));}catch(e){alert("Erro: "+e.message);}

// ── AÇÕES MANOBRISTA ──────────────────────────────────────────────────────────
window.acaoCarreg=async(id,status)=>{
  try{
    const updates={status};
    if(status==="encostado"||status==="concluido"||status==="problema"){
      updates.manobNomeAcao=nomeManob;
    }
    await update(ref(db,`carregamentos/${id}`),updates);
  }catch(e){alert("Erro: "+e.message);}
};

// ── MODAL REPASSAR ────────────────────────────────────────────────────────────
window.abrirRepassar=taskId=>{
  const task=tarefas.find(t=>t.id===taskId);
  if(!task)return;
  const disponiveis=Object.entries(operadores).filter(([id])=>id!==task.atribId);
  if(disponiveis.length===0){alert("Não há outros operadores online para repassar.");return;}
  const carga=id=>tarefas.filter(t=>["pendente","andamento","pulado"].includes(t.status)&&(t.atribId===id||(!t.atribId&&id==="livre"))).length;
  const overlay=document.createElement("div");
  overlay.className="modal-overlay";overlay.id="modalRepassar";
  overlay.innerHTML=`
    <div class="modal">
      <div class="modal-title">${I.transfer} Repassar Tarefa</div>
      <div class="modal-sub"><b style="color:var(--am)">${task.endereco}</b><br>${task.descricao||"Sem descrição"} · ${task.tipo==="picking"?"Picking":"Palete"}</div>
      <div class="modal-ops">
        ${disponiveis.map(([id,op])=>{
          const n=carga(id);
          return `<button class="modal-op-btn" onclick="window.confirmarRepassar('${taskId}','${id}','${op.nome}')">
            <div style="width:36px;height:36px;border-radius:10px;background:#3b82f622;border:1px solid #3b82f644;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              ${I.forklift.replace('width="20" height="20"','width="18" height="18"').replace('stroke="currentColor"','stroke="#3b82f6"')}
            </div>
            <div><div class="modal-op-nome">${op.nome}</div><div class="modal-op-info">${n===0?"Fila livre":n===1?"1 tarefa na fila":`${n} tarefas na fila`}</div></div>
            <div style="margin-left:auto;color:${n===0?"var(--gr)":n<=2?"var(--am)":"var(--rd)"};font-family:'Bebas Neue';font-size:22px">${n}</div>
          </button>`;
        }).join("")}
        ${task.atribId?`<button class="modal-op-btn" onclick="window.confirmarRepassar('${taskId}','qualquer','')">
          <div style="width:36px;height:36px;border-radius:10px;background:#4b588220;display:flex;align-items:center;justify-content:center;flex-shrink:0">${I.users.replace('stroke="currentColor"','stroke="#8892b0"')}</div>
          <div><div class="modal-op-nome" style="color:var(--tx2)">Qualquer operador</div><div class="modal-op-info">Remover atribuição específica</div></div>
        </button>`:""}
      </div>
      <button class="modal-cancel" onclick="window.fecharModal()">Cancelar</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener("click",e=>{if(e.target===overlay)window.fecharModal();});
};

window.fecharModal=()=>{document.getElementById("modalRepassar")?.remove();};

window.confirmarRepassar=async(taskId,novoOpId,novoOpNome)=>{
  window.fecharModal();
  try{
    const updates=novoOpId==="qualquer"?{atribId:null,atribNome:null}:{atribId:novoOpId,atribNome:novoOpNome};
    await update(ref(db,`tarefas/${taskId}`),updates);
  }catch(e){alert("Erro ao repassar: "+e.message);}
};

// ── FIREBASE LISTENERS ────────────────────────────────────────────────────────
onValue(tasksRef,snap=>{
  if(perfil==="repositor"){
    window._fs={
      end:document.getElementById("fEnd")?.value,
      tipo:tipoAtual,camara:camaraAtual,
    };
  }
  const data=snap.val()||{};
  const novo=Object.entries(data).map(([id,v])=>({id,...v})).sort((a,b)=>a.ts-b.ts);
  if(perfil==="operador"&&nomeOperador&&prevIds!==null){
    const minhasNovas=novo.filter(t=>t.status==="pendente"&&(!t.atribId||t.atribId===opId)&&!prevIds.includes(t.id));
    if(minhasNovas.length>0)beep();
  }
  if(perfil==="operador"&&nomeOperador){
    prevIds=novo.filter(t=>t.status==="pendente"&&(!t.atribId||t.atribId===opId)).map(t=>t.id);
  }
  tarefas=novo;
  if(["repositor","operador"].includes(perfil)||(perfil==="operador"&&!nomeOperador))render();
});

onValue(operadoresRef,snap=>{
  operadores=snap.val()||{};
  if(perfil==="repositor")render();
});

onValue(carregRef,snap=>{
  const data=snap.val()||{};
  const novo=Object.entries(data).map(([id,v])=>({id,...v})).sort((a,b)=>a.ts-b.ts);

  // Som para manobrista — nova placa atribuída
  if(perfil==="manobrista"&&nomeManob&&prevCarrIds!==null){
    const novas=novo.filter(c=>
      c.status==="pendente"&&
      (!c.manobNome||c.manobNome===nomeManob)&&
      !prevCarrIds.includes(c.id)
    );
    if(novas.length>0)beep();

    // Som de liberação
    const liberadas=novo.filter(c=>
      c.status==="liberado"&&
      (c.manobNome===nomeManob||!c.manobNome)&&
      !prevLibIds.includes(c.id)
    );
    if(liberadas.length>0)beepLib();
  }

  if(perfil==="manobrista"&&nomeManob){
    prevCarrIds=novo.filter(c=>c.status==="pendente"&&(!c.manobNome||c.manobNome===nomeManob)).map(c=>c.id);
    prevLibIds=novo.filter(c=>c.status==="liberado").map(c=>c.id);
  }

  carregamentos=novo;
  if(perfil==="expedicao"||perfil==="manobrista")render();
});

onValue(manoOnlineRef,snap=>{
  manobristas=snap.val()||{};
  if(perfil==="expedicao")render();
});

onValue(nomesManobRef,snap=>{
  nomesManobristas=snap.val()||{};
  if(perfil==="expedicao"||(!nomeManob&&perfil==="manobrista"))render();
});

window.addEventListener("beforeunload",()=>{
  if(perfil==="operador")removerOperador();
  if(perfil==="manobrista")removerManobrista();
});
