<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="theme-color" content="#050709"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="RepoApp"/>
  <title>RepoApp</title>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const APP_VERSION = "v1.8.1";

    // ── CONFIGURAÇÃO DE FONTE ─────────────────────────────────────────────
    const FONT_PRESETS = { P: 42, M: 56, G: 72, GG: 92, Auto: 0 };

    function getFontKey() {
      return perfil === "repositor" ? "repoapp-fontsize-rep" : "repoapp-fontsize-op";
    }

    function getFontSize() {
      const saved = localStorage.getItem(getFontKey());
      if (saved && FONT_PRESETS[saved] !== undefined) return saved;
      return "Auto";
    }

    function calcAutoFontSize() {
      const w = window.innerWidth;
      if (w <= 360) return 48;
      if (w <= 414) return 58;
      if (w <= 768) return 68;
      return 80;
    }

    function getFontSizePx() {
      const preset = getFontSize();
      if (preset === "Auto") return calcAutoFontSize();
      return FONT_PRESETS[preset];
    }

    function aplicarFonte() {
      const px = getFontSizePx();
      const spacing = Math.max(2, Math.round(px * 0.07));
      document.documentElement.style.setProperty("--addr-size", px + "px");
      document.documentElement.style.setProperty("--addr-spacing", spacing + "px");
    }

    // Expondo funções de configuração para o Escopo Global
    window.setFontSize = (preset) => {
      localStorage.setItem(getFontKey(), preset);
      aplicarFonte();
      render(); // Re-renderiza para atualizar classes 'cfg-ativo' e preview
    };

    window.toggleConfig = () => {
      const el = document.getElementById("configPanel");
      if (el) el.classList.toggle("hidden");
    };

    window.addEventListener("resize", () => { 
      if (getFontSize() === "Auto") aplicarFonte(); 
    });

    // ── FIREBASE CONFIG ───────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyCp7oep4v4YTv9KjU_BCNAl5jgWlCTdvmI",
      authDomain: "repoapp-1edbd.firebaseapp.com",
      databaseURL: "https://repoapp-1edbd-default-rtdb.firebaseio.com",
      projectId: "repoapp-1edbd",
      storageBucket: "repoapp-1edbd.firebasestorage.app",
      messagingSenderId: "151491743077",
      appId: "1:151491743077:web:06aa81e8ce4c4e032f258c"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    const tasksRef = ref(db, "tarefas");

    // ── ESTADO GLOBAL ─────────────────────────────────────────────────────
    let perfil = null, tarefas = [], tipoAtual = "picking";
    let prevIds = null;

    // ── HELPER FUNCTIONS ──────────────────────────────────────────────────
    const fmtHora = ts => ts ? new Date(ts).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}) : "";
    
    function parseEndereco(s) {
      s = (s||"").trim();
      if (!s) return { valido: false, erro: "" };
      const reCompleto = /^B\s+(\d{3})\s+(\d{4})\s+(\d{2})$/i;
      if (reCompleto.test(s)) return { completo: s.toUpperCase(), valido: true, erro: "" };
      const p = s.split(/[-\/\s]+/).filter(Boolean);
      if (p.length !== 3) return { valido: false, erro: 'Use: RUA-POS-NÍVEL ex: "4-56-2"' };
      const rua = parseInt(p[0]), pos = parseInt(p[1]), nivel = parseInt(p[2]);
      if (isNaN(rua)||isNaN(pos)||isNaN(nivel)) return { valido: false, erro: "Apenas números" };
      if (rua<1||rua>4) return { valido: false, erro: "Rua: 1 a 4" };
      if (pos<1||pos>88) return { valido: false, erro: "Posição: 1 a 88" };
      if (nivel<1||nivel>5) return { valido: false, erro: "Nível: 1–5" };
      const nivelLabel = ["","Picking","2º nível","3º nível","4º nível","5º nível"][nivel];
      const completo = `B ${String(rua).padStart(3,"0")} ${String(pos).padStart(4,"0")} ${String(nivel*10).padStart(2,"0")}`;
      return { completo, valido: true, erro: "", rua, pos, nivel, nivelLabel };
    }

    function tempoNaFila(ts) {
      const mins = Math.floor((Date.now() - ts) / 60000);
      if (mins < 1) return "agora";
      if (mins === 1) return "1 min";
      if (mins < 60) return `${mins} min`;
      const h = Math.floor(mins/60), m = mins%60;
      return m > 0 ? `${h}h ${m}min` : `${h}h`;
    }

    function corTempo(ts) {
      const mins = Math.floor((Date.now() - ts) / 60000);
      if (mins < 5) return "var(--gr)";
      if (mins < 15) return "var(--am)";
      return "var(--rd)";
    }

    function tocarSom() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.18].forEach(delay => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 880; osc.type = "sine";
          gain.gain.setValueAtTime(0, ctx.currentTime + delay);
          gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + delay + 0.01);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + delay + 0.12);
          osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + 0.15);
        });
      } catch {}
    }

    // ── SWIPE ──
    function initSwipe(el, onRight) {
      let startX=0, startY=0, dx=0, moving=false;
      el.addEventListener("touchstart", e=>{
        startX=e.touches[0].clientX; startY=e.touches[0].clientY; dx=0; moving=false;
      },{passive:true});
      el.addEventListener("touchmove", e=>{
        dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>10) {
          moving=true;
          if (dx>0) {
            el.style.transform=`translateX(${dx}px)`;
            el.style.opacity=`${1-Math.min(dx/200,0.4)}`;
            const h=el.querySelector(".sh");
            if(h){h.textContent="✅ CONCLUÍDO";h.style.opacity=Math.min(dx/80,1);}
          }
        }
      },{passive:true});
      el.addEventListener("touchend", ()=>{
        if(moving && dx>80){onRight();return;}
        el.style.transform=""; el.style.opacity="";
        const h=el.querySelector(".sh");
        if(h){h.textContent="";h.style.opacity=0;}
      });
    }

    // ── RENDERS ──
    function htmlConfigPanel(bgVar, bdVar) {
      const cur = getFontSize();
      const px = getFontSizePx();
      const sp = Math.max(2, Math.round(px * 0.07));
      return `<div id="configPanel" class="config-panel hidden" style="background:var(${bgVar});border-bottom:1px solid var(${bdVar})">
          <span class="config-label">Tamanho do endereço:</span>
          <div class="config-btns">
            ${Object.keys(FONT_PRESETS).map(k => `<button class="cfg-btn ${cur===k?"cfg-ativo":""}" onclick="setFontSize('${k}')">${k}${k==="Auto"?" 📱":""}</button>`).join("")}
          </div>
          <span class="config-preview" id="cfgPreview" style="font-size:${px}px;letter-spacing:${sp}px">B 004 0056 10</span>
        </div>`;
    }

    function renderLogin() {
      document.getElementById("app").innerHTML=`
        <div class="login">
          <div class="logo">R</div>
          <h1>REPOAPP</h1>
          <p class="sub">Reposição de Picking</p>
          <span class="versao">${APP_VERSION}</span>
          <div class="lcards">
            <button class="lcard" onclick="escolher('repositor')">
              <span style="font-size:32px">📋</span>
              <span class="lct">REPOSITOR</span>
              <span class="lcd">Enviar endereço ao operador</span>
            </button>
            <button class="lcard" onclick="escolher('operador')">
              <span style="font-size:32px">🏗️</span>
              <span class="lct">OPERADOR</span>
              <span class="lcd">Ver fila de reposições</span>
            </button>
          </div>
        </div>`;
    }

    function renderRepositor() {
      const fila = tarefas.filter(t=>["pendente","andamento","pulado"].includes(t.status));
      const hist = tarefas.filter(t=>["concluido","vazio"].includes(t.status));
      const alts = tarefas.filter(t=>t.status==="vazio"&&!t.alertaVisto);

      document.getElementById("app").innerHTML=`
        <div class="topbar">
          <span class="tlogo">REPO</span>
          <span class="trole rep">📋 Repositor</span>
          <span class="tsp"></span>
          <span class="tlive"><span class="dot"></span>ao vivo</span>
          <span class="tver">${APP_VERSION}</span>
          <button class="tout tbtnconf" onclick="toggleConfig()">⚙️</button>
          <button class="tout" onclick="sair()">Trocar</button>
        </div>
        ${htmlConfigPanel("--s1","--bd")}
        ${alts.map(t=>`
          <div class="alerta" id="al-${t.id}">
            <span class="adot"></span>
            <div style="flex:1"><b>⚠️ Endereço vazio!</b><br>
            <span>${t.endereco}${t.descricao?" — "+t.descricao:""}</span><br>
            <small>Consulte o Basic e envie novo endereço.</small></div>
            <button onclick="fecharAlerta('${t.id}')">✕</button>
          </div>`).join("")}
        <div class="main">
          <div class="formcard">
            <div class="ftitle">📦 Nova Reposição</div>
            <label class="lbl">Endereço <small>ex: 4-56-2</small></label>
            <input id="fEnd" class="inp" placeholder="4-56-2" oninput="previewEnd(this.value)"/>
            <div id="prevEnd" class="preview hidden"></div>
            <div id="avisoEnd" class="aviso-dup hidden"></div>
            <label class="lbl">Código <small>opcional</small></label>
            <input id="fCod" class="inp" placeholder="Código do produto (opcional)"/>
            <label class="lbl">Descrição <small>opcional</small></label>
            <input id="fDesc" class="inp" placeholder="Nome do produto (opcional)"/>
            <label class="lbl">Tipo</label>
            <div class="toggle">
              <button class="tbtn active" id="tPick" onclick="setTipo('picking')">📦 PICKING</button>
              <button class="tbtn" id="tPal" onclick="setTipo('palete')">🏗️ PALETE FECHADO</button>
            </div>
            <button class="btnenv" onclick="enviar()">ENVIAR AO OPERADOR →</button>
          </div>
          ${fila.length>0?`<div class="secao">FILA (${fila.length})</div>${fila.map(t=>cardRep(t)).join("")}`:""}
          ${hist.length>0?`<div class="secao">HISTÓRICO HOJE (${hist.length})</div>${hist.map(t=>cardRep(t)).join("")}<button class="btnlimpar" onclick="limparTudo()">🗑️ Limpar tudo</button>`:""}
        </div>`;
    }

    function cardRep(t) {
      const cor={pendente:"#f59e0b",andamento:"#3b82f6",concluido:"#22c55e",vazio:"#ef4444",pulado:"#8892b0"}[t.status];
      const lbl={pendente:"PENDENTE",andamento:"EM ANDAMENTO",concluido:"CONCLUÍDO",vazio:"END. VAZIO",pulado:"PULADO"}[t.status];
      const isHist=["concluido","vazio"].includes(t.status);
      return `<div class="crep" style="border-left-color:${cor}${isHist?";opacity:.6":""}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;color:${cor};flex:1">${t.endereco}</span>
            <span class="chip" style="color:${cor};border-color:${cor}40;background:${cor}15">${lbl}</span>
            ${!isHist?`<button class="btnrem" onclick="removerTarefa('${t.id}')">✕</button>`:""}
          </div>
          ${t.descricao?`<div class="ctprod">${t.descricao}</div>`:""}
          <div class="ctmeta">
            <span class="tbadge" style="color:${t.tipo==="picking"?"#f59e0b":"#3b82f6"};background:${t.tipo==="picking"?"#f59e0b22":"#3b82f622"};border-color:${t.tipo==="picking"?"#f59e0b44":"#3b82f644"}">${t.tipo==="picking"?"📦 PICKING":"🏗️ PALETE FECHADO"}</span>
            <span style="color:var(--mu);font-size:10px">${fmtHora(t.ts)}</span>
          </div>
        </div>`;
    }

    function renderOperador() {
      const ativos = tarefas.filter(t=>t.status==="pendente"||t.status==="andamento").sort((a,b)=>a.ts-b.ts);
      const pulados = tarefas.filter(t=>t.status==="pulado").sort((a,b)=>a.ts-b.ts);
      const fila = [...ativos,...pulados];
      const hist = tarefas.filter(t=>t.status==="concluido"||t.status==="vazio");

      document.getElementById("app").innerHTML=`
        <div class="topbar-op">
          <span class="tlogo">REPO</span>
          <span class="trole oper">🏗️ Operador</span>
          <span class="tsp"></span>
          <span class="tlive"><span class="dot"></span>ao vivo</span>
          <span class="tver">${APP_VERSION}</span>
          <button class="tout tbtnconf" onclick="toggleConfig()">⚙️</button>
          <button class="tout" onclick="sair()">Trocar</button>
        </div>
        ${htmlConfigPanel("--s1-op","--bd-op")}
        <div class="main-op">
          ${fila.length===0?`<div class="empty"><div class="ei">🟢</div><div class="et">Sem tarefas</div><div class="es">Aguardando reposições.</div></div>`:
            fila.map((t,i)=>cardOp(t,i)).join("")}
          ${fila.length>0?`<div class="sdica">👉 Arraste para direita para <b>concluir</b></div>`:""}
          ${hist.length>0?`<div class="secao">CONCLUÍDAS HOJE (${hist.length})</div>${hist.map(t=>`<div class="chist" style="border-left-color:${t.status==="concluido"?"#22c55e":"#ef4444"}"><span style="font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;color:${t.status==="concluido"?"#22c55e":"#ef4444"}">${t.endereco}</span><span style="margin-left:auto;font-size:10px;color:var(--mu)">${fmtHora(t.ts)}</span></div>`).join("")}`:""}
        </div>`;

      fila.forEach(t=>{
        const el=document.getElementById(`op-${t.id}`);
        if(el) initSwipe(el, ()=>window.acao(t.id,"concluido"));
      });
    }

    function cardOp(t, i) {
      const isFirst = i===0 && t.status !== "pulado";
      const tipoCor = t.tipo==="picking"?"#f59e0b":"#3b82f6";
      const tipoTxt = t.tipo==="picking"?"📦 PICKING":"🏗️ PALETE FECHADO";

      if(isFirst) {
        return `<div class="cop-main" id="op-${t.id}">
            <div class="sh"></div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
              <div class="tipo-main" style="color:${tipoCor}">${tipoTxt}</div>
              <span class="tempo-fila" style="color:${corTempo(t.ts)};font-size:13px;font-weight:700">⏱ ${tempoNaFila(t.ts)}</span>
            </div>
            <div class="addr-main">${t.endereco}</div>
            ${t.descricao?`<div class="desc-main">${t.descricao}</div>`:""}
            ${t.codigo?`<div class="cod-main">Cód: ${t.codigo}</div>`:""}
            <div class="opbtns">
              ${t.status==="pendente"?`<button class="abtn blue" onclick="acao('${t.id}','andamento')">✊ RECEBI</button>`:""}
              ${t.status==="andamento"?`<button class="abtn green" onclick="acao('${t.id}','concluido')">✅ CONCLUÍDO</button><button class="abtn red" onclick="acao('${t.id}','vazio')">⚠️ VAZIO</button>`:""}
              <button class="abtn gray" onclick="pular('${t.id}')">⏭ PULAR</button>
            </div>
          </div>`;
      } else {
        return `<div class="cop-sec" id="op-${t.id}">
            <div class="sh"></div>
            <div style="display:flex;align-items:center;gap:10px">
              <div>
                <div style="font-family:'Bebas Neue';font-size:11px;color:${tipoCor}">${tipoTxt}</div>
                <div style="font-family:'Bebas Neue';font-size:28px;letter-spacing:3px;color:${t.status==="pulado"?"#8892b0":"#3b82f6"}">${t.endereco}</div>
              </div>
              <div style="margin-left:auto;text-align:right">
                <span style="color:${corTempo(t.ts)};font-size:10px;font-weight:700">⏱ ${tempoNaFila(t.ts)}</span>
              </div>
            </div>
          </div>`;
      }
    }

    // ── WINDOW FUNCTIONS (EXPOSTAS) ──
    window.escolher = p => { perfil=p; aplicarFonte(); render(); };
    window.sair = () => { perfil=null; render(); };
    window.setTipo = t => { tipoAtual=t; render(); };
    
    window.previewEnd = v => {
      const elP=document.getElementById("prevEnd");
      const elA=document.getElementById("avisoEnd");
      if(!elP) return;
      if(!v.trim()){ elP.className="preview hidden"; if(elA) elA.className="aviso-dup hidden"; return; }
      const r=parseEndereco(v);
      elP.classList.remove("hidden");
      if(r.valido){
        elP.className="preview ok";
        elP.innerHTML=`<span class="pok">✓</span><div><div class="pfull">${r.completo}</div></div>`;
        const dup = tarefas.find(t=>t.endereco===r.completo && ["pendente","andamento","pulado"].includes(t.status));
        if(elA && dup){
          elA.className="aviso-dup";
          elA.innerHTML=`⚠️ Já na fila (${dup.status}). <button class="btndup-sim" onclick="forcarEnvio()">Enviar mesmo assim</button>`;
        } else if(elA) elA.className="aviso-dup hidden";
      } else {
        elP.className="preview err";
        elP.innerHTML=`<span class="perr">✕</span><span style="font-size:11px;color:#ef4444">${r.erro}</span>`;
      }
    };

    window.enviar = async () => {
      const r=parseEndereco(document.getElementById("fEnd")?.value||"");
      if(!r.valido) return;
      await push(tasksRef,{ endereco: r.completo, codigo: document.getElementById("fCod")?.value, descricao: document.getElementById("fDesc")?.value, tipo:tipoAtual, status:"pendente", ts:Date.now() });
      document.getElementById("fEnd").value=""; render();
    };

    window.forcarEnvio = window.enviar;
    window.acao = async (id, status) => { await update(ref(db,`tarefas/${id}`),{status}); };
    window.pular = async id => { await update(ref(db,`tarefas/${id}`),{status:"pulado",ts:Date.now()}); };
    window.removerTarefa = async id => { if(confirm("Remover?")) await remove(ref(db,`tarefas/${id}`)); };
    window.fecharAlerta = async id => { await update(ref(db,`tarefas/${id}`),{alertaVisto:true}); };
    window.limparTudo = async () => { if(confirm("Limpar?")) await remove(tasksRef); };

    function render() {
      if(!perfil) renderLogin();
      else perfil==="repositor" ? renderRepositor() : renderOperador();
    }

    // ── FIREBASE LISTENER ──
    onValue(tasksRef, snap=>{
      aplicarFonte();
      const data=snap.val()||{};
      const novas = Object.entries(data).map(([id,v])=>({id,...v})).sort((a,b)=>a.ts-b.ts);
      if(perfil==="operador" && prevIds !== null){
        const novasIds = novas.filter(t=>t.status==="pendente").map(t=>t.id);
        if(novasIds.some(id=>!prevIds.includes(id))) tocarSom();
      }
      prevIds = novas.filter(t=>t.status==="pendente").map(t=>t.id);
      tarefas = novas;
      render();
    });

    aplicarFonte();
    render();
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0e17;--s1:#131726;--s2:#1a1f32;--bd:#2c3454;
      --am:#f59e0b;--bl:#3b82f6;--gr:#22c55e;--rd:#ef4444;
      --tx:#dde3f5;--tx2:#8892b0;--mu:#4b5882;
      --bg-op:#020305;--s1-op:#0a0d14;--bd-op:#1a2040;
      --tx-op:#f0f4ff;--tx2-op:#6b7aa0;--mu-op:#3a4460;
    }
    html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overflow-x:hidden}
    #app{display:flex;flex-direction:column;min-height:100dvh}
    .hidden{display:none!important}

    /* LOGIN */
    .login{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a2040,var(--bg) 70%)}
    .logo{width:72px;height:72px;border-radius:18px;background:var(--am);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:40px;color:#0b0e17;margin-bottom:20px}
    .login h1{font-family:'Bebas Neue';font-size:44px;letter-spacing:3px}
    .lcards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
    .lcard{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:28px 20px;cursor:pointer;width:150px;color:var(--tx)}
    .lct{font-family:'Bebas Neue';font-size:20px;display:block}
    .lcd{font-size:11px;color:var(--tx2)}

    /* TOPBARS */
    .topbar, .topbar-op{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
    .topbar-op{background:var(--s1-op);border-bottom-color:var(--bd-op)}
    .tlogo{font-family:'Bebas Neue';font-size:22px;color:var(--am)}
    .tsp{flex:1}
    .tout{background:transparent;border:1px solid var(--bd);color:var(--tx2);font-size:11px;padding:5px 12px;border-radius:8px;cursor:pointer}

    /* MAIN */
